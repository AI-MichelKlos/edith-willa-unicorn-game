<style>

.ground{position:absolute;left:-10vw;right:-10vw;bottom:-7vh;height:26vh;border-radius:50% 50% 0 0;background:#54bd62}.cheetah .ground{background:#c58a36}.flowers{position:absolute;bottom:3vh;width:100%;font-size:28px;white-space:nowrap;opacity:.85}

#player{position:absolute;font-size:clamp(62px,17vw,104px);z-index:20;transform:translate(-50%,-50%);filter:drop-shadow(0 8px 8px #0003)}.thing,.bad{position:absolute;font-size:clamp(38px,9vw,58px);z-index:15;transform:translate(-50%,-50%);animation:bob 1.5s infinite alternate}.bad.car{font-size:clamp(42px,10vw,64px);animation:none}.bad.bee{animation:bee 1s infinite alternate}@keyframes bee{from{transform:translate(-50%,-50%) rotate(-8deg)}to{transform:translate(-50%,-50%) rotate(8deg)}}
#hud{position:absolute;top:max(10px,env(safe-area-inset-top));left:10px;background:#ffffffcc;color:#6b3fa0;padding:9px 13px;border-radius:18px;font-weight:bold;font-size:18px;z-index:50;box-shadow:0 4px 10px #0002}#hud small{display:block;color:#8a3ffc}.msg{position:absolute;left:50%;top:13%;transform:translateX(-50%);background:#fff9;color:#8a3ffc;padding:12px 18px;border-radius:22px;font-size:clamp(21px,6vw,36px);font-weight:bold;text-align:center;z-index:80}
.overlay{position:absolute;inset:0;background:linear-gradient(#ffd6f5dd,#d8f7ffdd);display:flex;align-items:center;justify-content:center;text-align:center;z-index:100}.card{width:min(92vw,520px);background:#ffffffdd;border-radius:32px;padding:24px;box-shadow:0 12px 35px #0004;color:#7438ca}.btn{border:0;border-radius:28px;background:white;color:#9047ff;font-weight:bold;box-shadow:0 8px 24px #0003;touch-action:manipulation;pointer-events:auto;font-size:clamp(22px,7vw,38px);padding:16px 24px;margin:8px;min-width:220px;position:relative;z-index:101}.small{font-size:20px;padding:12px 18px}.pink{background:#ffe6f6}.purple{background:#eee3ff}
.firework{position:absolute;width:8px;height:8px;border-radius:50%;z-index:90;pointer-events:none;animation:boom .9s ease-out forwards}@keyframes boom{from{transform:translate(0,0);opacity:1}to{transform:translate(var(--dx),var(--dy)) scale(.35);opacity:0}}.book{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:16px 0;max-height:58dvh;overflow:auto;padding:2px}.book div{background:#fff;border-radius:18px;padding:12px;font-size:38px;box-shadow:0 4px 12px #0002}.book small{display:block;font-size:13px;color:#7a40d8}.hidden{display:none!important}

/* Version 2.1: skåle/kister og mobilvenlig svømmebane */
.collectWrap{display:inline-flex;align-items:center;gap:10px;max-width:94vw;background:#ffffffb8;border:3px solid #fff;border-radius:28px;padding:9px 12px;box-shadow:0 8px 20px #0002;color:#7438ca;text-shadow:none}
.collectVessel{font-size:clamp(38px,12vw,72px);filter:drop-shadow(0 4px 5px #0002);animation:bob 1.6s infinite alternate}
.collectText{display:flex;flex-direction:column;align-items:flex-start;gap:4px}
.collectTitle{font-size:clamp(16px,4.6vw,28px);line-height:1;font-weight:bold}
.collectSlots{letter-spacing:1px;font-size:clamp(17px,5vw,32px);line-height:1.05;max-width:68vw;overflow:hidden;white-space:nowrap}
.collectSlots .empty{opacity:.25;filter:grayscale(1)}
.collectHint{font-size:clamp(13px,3.8vw,20px);line-height:1;color:#6b3fa0}
#hud{max-width:calc(100vw - 20px)}
.swimTip{position:absolute;right:10px;bottom:max(12px,env(safe-area-inset-bottom));z-index:55;background:#ffffffc9;color:#1169a8;border-radius:22px;padding:10px 14px;font-weight:bold;font-size:clamp(14px,4.2vw,20px);box-shadow:0 6px 14px #0002}
.bubble{position:absolute;border-radius:50%;background:#ffffff66;border:2px solid #ffffffaa;z-index:7;animation:bubbleUp 3.5s linear forwards;pointer-events:none}
@keyframes bubbleUp{from{transform:translateY(0) scale(.7);opacity:.75}to{transform:translateY(-58vh) scale(1.25);opacity:0}}


/* Version 2.2: flottere eventyrslot til slutningen */
#castle{
  position:absolute;
  left:50%;
  top:43%;
  transform:translate(-50%,-50%);
  width:min(60vw,310px);
  height:min(50vw,250px);
  font-size:initial!important;
  z-index:30!important;
  pointer-events:none;
  filter:drop-shadow(0 14px 18px rgba(79,34,122,.28)) drop-shadow(0 0 28px rgba(255,255,255,.55));
  animation:castleFloat 2.8s ease-in-out infinite alternate, castleGlowFancy 2s ease-in-out infinite alternate;

  left:50%;
  top:-2%;
  transform:translateX(-50%);
  width:88%;
  height:42%;

  background:linear-gradient(90deg,#ff8bcf 0%,#ffc95c 19%,#a6ee79 38%,#77ddff 58%,#a78cff 79%,#ff8bcf 100%);

  overflow:hidden;
}
#castle .castle-rainbow::after{
  content:"";
  position:absolute;
  left:50%;
  bottom:-74%;
  transform:translateX(-50%);
  width:72%;
  height:150%;
  border-radius:50%;
  background:rgba(255,255,255,.75);
}
#castle .castle-stars span{
  position:absolute;
  z-index:2;
  filter:drop-shadow(0 0 10px rgba(255,255,255,.85));
  animation:sparkleTwinkle 1.9s ease-in-out infinite;
}
#castle .s1{left:10%;top:7%;font-size:18px}
#castle .s2{left:26%;top:1%;font-size:16px;animation-delay:-.6s}
#castle .s3{right:24%;top:3%;font-size:17px;animation-delay:-1.1s}
#castle .s4{right:9%;top:10%;font-size:15px;animation-delay:-.2s}
#castle .s5{left:50%;top:-1%;font-size:17px;transform:translateX(-50%);animation-delay:-1.4s}
#castle .castle-cloud{
  position:absolute;
  top:17%;

  opacity:.92;
  z-index:1;

}
#castle .cloud-left{left:-4%}
#castle .cloud-right{right:-4%;animation-delay:-1.3s}
#castle .castle-body{
  position:absolute;
  left:50%;
  bottom:13%;
  transform:translateX(-50%);
  width:84%;
  height:68%;
}
#castle .tower,
#castle .main{
  position:absolute;
  bottom:0;
  background:linear-gradient(#fff6ff 0%,#f7d5ff 58%,#e9c0ff 100%);

  height:60%;

}
#castle .tower.left{left:0}
#castle .tower.right{right:0}
#castle .tower.center{
  left:50%;

  width:28%;
  height:78%;

}
#castle .main{
  left:50%;
  transform:translateX(-50%);
  width:66%;
  height:54%;
  border-radius:28px 28px 14px 14px;
}
#castle .tower::before{
  content:"";

  left:50%;

  height:28%;
  border-radius:10px;
  background:linear-gradient(#fff6b6,#ffd463);
}
#castle .roof{

  height:22px;

  background:linear-gradient(#fffbe0,#ffd96e);
  box-shadow:0 0 10px rgba(255,233,120,.95);
}
#castle .main .window{
  top:26%;
}
#castle .main .win1{left:35%}
#castle .main .win2{left:65%}
#castle .door{
  position:absolute;
  left:50%;
  bottom:0;
  transform:translateX(-50%);
  width:26%;

  background:linear-gradient(#8f6040,#6b3b22);

}
#castle .door::after{
  content:"";
  position:absolute;
  right:18%;
  top:58%;

  height:6px;
  border-radius:50%;

  box-shadow:0 0 8px rgba(255,229,140,.95);
}
#castle .gem{
  position:absolute;
  left:50%;
  top:6%;
  transform:translateX(-50%);

  filter:drop-shadow(0 0 8px rgba(255,255,255,.95));
}
#castle .castle-path{
  position:absolute;
  left:50%;
  bottom:4%;
  transform:translateX(-50%);
  width:34%;
  height:14%;
  background:linear-gradient(#fff1c2,#ffd473);
  border-radius:70% 70% 12px 12px;
  opacity:.94;
  box-shadow:0 6px 18px rgba(255,215,120,.35);
}
@keyframes castleFloat{
  from{transform:translate(-50%,-50%) translateY(-4px)}
  to{transform:translate(-50%,-50%) translateY(7px)}
}
@keyframes castleGlowFancy{
  from{filter:drop-shadow(0 14px 18px rgba(79,34,122,.28)) drop-shadow(0 0 22px rgba(255,255,255,.5))}

@keyframes sparkleTwinkle{

}
@keyframes cloudDrift{
  from{transform:translateX(-4px) translateY(0)}
  to{transform:translateX(8px) translateY(4px)}
}

  0%,100%{transform:translateX(4px) rotate(0deg)}
  50%{transform:translateX(6px) rotate(10deg)}

@media (max-width:480px){
  #castle{width:min(72vw,290px);height:min(58vw,240px)}
  #castle .castle-cloud{font-size:26px}
}


/* Version 2.3: præmie-tegnefilm til slutningen */
#movie.overlay{
  background:linear-gradient(#19083fdd,#5526aadd 48%,#f9ccffdd);
  z-index:120;
  padding:0;
}
.movieStage{
  position:relative;
  width:min(94vw,760px);
  height:min(76dvh,560px);

  background:
    radial-gradient(circle at 20% 14%,#fff9 0 1.4%,transparent 1.7%),

.movieCastle{

.movieStars .m2{left:79%;top:18%;animation-delay:-.4s}

.movieStars .m4{left:24%;top:38%;animation-delay:-1.1s}

  bottom:24%;

}

.movieChar.uni{left:122%;bottom:2%;font-size:clamp(32px,9vw,60px);animation-delay:.45s}
.movieChar.cheetah{left:-28%;bottom:3%;font-size:clamp(31px,8vw,58px);animation-delay:.58s}

.movieHearts{

  left:50%;
  top:38%;
  transform:translateX(-50%);

  font-size:clamp(22px,6vw,42px);

.movieControls{
  position:absolute;

  z-index:14;

  0%,100%{transform:translateY(0) scale(1)}

}

  0%{opacity:0;transform:translateX(-50%) scale(.85)}

}

}

  0%,100%{opacity:.45;transform:scale(.75) rotate(-10deg)}

@keyframes movieHearts{
  0%,46%{opacity:0;transform:translateX(-50%) translateY(12px) scale(.6)}
  58%,85%{opacity:1;transform:translateX(-50%) translateY(-8px) scale(1)}
  100%{opacity:0;transform:translateX(-50%) translateY(-24px) scale(1.15)}
}

/* Mørk lygtebane */
#game.night .rainbow{opacity:.06}
#game.night .sun{
  right:9vw;
  top:8vh;
  font-size:54px;
  opacity:.95;
  filter:drop-shadow(0 0 18px rgba(255,245,167,.7));
}

function saveCards(list){let s=loadProgress();(list||[]).forEach(icon=>{if(!s.cards.includes(icon))s.cards.push(icon)});saveProgress(s)}
function show(t,ms=1600){msgEl.textContent=t;msgEl.classList.remove("hidden");clearTimeout(show.t);show.t=setTimeout(()=>msgEl.classList.add("hidden"),ms)}
let sfxCtx=null;
async function unlockAudio(){try{sfxCtx=sfxCtx||new(window.AudioContext||window.webkitAudioContext)();if(sfxCtx.state==="suspended")await sfxCtx.resume();let o=sfxCtx.createOscillator(),g=sfxCtx.createGain();g.gain.value=.0001;o.connect(g);g.connect(sfxCtx.destination);o.start();o.stop(sfxCtx.currentTime+.01)}catch(e){}}
function tone(f,d=.12,v=.08,type="sine"){try{sfxCtx=sfxCtx||new(window.AudioContext||window.webkitAudioContext)();if(sfxCtx.state==="suspended")sfxCtx.resume().catch(()=>{});let o=sfxCtx.createOscillator(),g=sfxCtx.createGain();o.type=type;o.frequency.value=f;g.gain.value=v;o.connect(g);g.connect(sfxCtx.destination);o.start();g.gain.exponentialRampToValueAtTime(.001,sfxCtx.currentTime+d);o.stop(sfxCtx.currentTime+d)}catch(e){}}
function avSound(){tone(180,.12,.09,"sawtooth");setTimeout(()=>tone(95,.16,.07,"sawtooth"),90)}
async function startMusic(){if(musicStarted&&!music.paused)return;try{music.loop=true;music.volume=.18;if(music.readyState===0)music.load();await music.play();musicStarted=!music.paused}catch(e){musicStarted=false}}
function stopMusicForPrize(){try{if(music){music.pause();music.currentTime=0}musicStarted=false}catch(e){}}
function rand(a){return a[Math.floor(Math.random()*a.length)]}
function shuffle(a){let b=a.slice();for(let i=b.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
function levelTitle(l){return l.label.replace(/^Bane \d+:\s*/,"")}
function sceneFor(id){
  const scenes={
    cat:{tip:"Fyld katteskålen med fisk og hygge",fx:"<span class='sceneEmoji s1'>🐾</span><span class='sceneEmoji s2'>🧶</span><span class='sceneEmoji s3'>🌿</span><span class='sceneEmoji s4'>🐾</span><span class='sceneEmoji s5'>💖</span>",fore:"<div class='foreLine back'>🌿 🌿 🐾 🌿 🧶 🌿 🐾 🌿</div><div class='foreLine'>🌸 🐾 🌼 🧶 🌸 🐾 🌼</div>"},
    uni:{tip:"Saml stjerner til magiskålen",fx:"<span class='sceneEmoji s1'>🦋</span><span class='sceneEmoji s2'>✨</span><span class='sceneEmoji s3'>💖</span><span class='sceneEmoji s4'>🌸</span><span class='sceneEmoji s5'>⭐</span><span class='sceneEmoji s6'>✨</span>",fore:"<div class='foreLine back'>🌸 🌼 ✨ 🌷 🦋 🌸 ✨</div><div class='foreLine'>🌷 🌸 🌼 💖 🌻 🌸 🌼</div>"},
    cheetah:{tip:"Find diamanter på savannen",fx:"<span class='sceneEmoji s1'>☀️</span><span class='sceneEmoji s2'>🌾</span><span class='sceneEmoji s3'>💎</span><span class='sceneEmoji s4'>🌵</span><span class='sceneEmoji s5'>🌾</span>",fore:"<div class='foreLine back'>🌾 🌾 🌵 🌾 🪨 🌾 🌵</div><div class='foreLine'>🌾 🐾 🌾 🪨 🌾 🐾 🌾</div>"},
    circus:{tip:"Fyld popcornbøtten i manegen",fx:"<span class='sceneEmoji s1'>🎈</span><span class='sceneEmoji s2'>🎟️</span><span class='sceneEmoji s3'>✨</span><span class='sceneEmoji s4'>🍿</span><span class='sceneEmoji s5'>🎪</span>",fore:"<div class='foreLine back'>🎈 🎟️ 🎈 🎪 🎈 🎟️ 🎈</div><div class='foreLine'>🍿 🎪 🍦 🎟️ 🍿 🎪 🍧</div>"},
    water:{tip:"Svøm efter perler og bobler",fx:"<span class='sceneEmoji s1'>🐟</span><span class='sceneEmoji s2'>🫧</span><span class='sceneEmoji s3'>🐠</span><span class='sceneEmoji s4'>🪸</span><span class='sceneEmoji s5'>🐚</span>",fore:"<div class='foreLine back'>🫧 🪸 🐚 🫧 🪸 🐟 🫧</div><div class='foreLine'>🐚 🪸 🦪 🐚 🫧 🪸 🐚</div>"},
    space:{tip:"Saml stjernestøv til raketten",fx:"<span class='sceneEmoji s1'>🪐</span><span class='sceneEmoji s2'>💫</span><span class='sceneEmoji s3'>🌟</span><span class='sceneEmoji s4'>✨</span><span class='sceneEmoji s5'>🚀</span>",fore:"<div class='foreLine back'>✨ 🌟 🪐 ⭐ 💫 🌟 ✨</div><div class='foreLine'>🪨 ⭐ 🪨 💫 🪨 ⭐ 🪨</div>"},
    night:{tip:"Lys i mørket med lygten",fx:"<span class='sceneEmoji s1'>🦇</span><span class='sceneEmoji s2'>🦉</span><span class='sceneEmoji s3'>✨</span><span class='sceneEmoji s4'>🪲</span><span class='sceneEmoji s5'>🌙</span>",fore:"<div class='foreLine back'>🌲 🌙 🌲 ✨ 🌲 🪲 🌲</div><div class='foreLine'>🍄 🌲 ✨ 🏮 🌲 🍄 ✨</div>"},
    weather:{tip:"Saml sol, regn, sne og vind",fx:"<span class='weatherDrop d1'></span><span class='weatherDrop d2'></span><span class='weatherDrop d3'></span><span class='weatherDrop d4'></span><span class='weatherDrop d5'></span><span class='weatherDrop d6'></span><span class='weatherFlash'>⚡</span><span class='sceneEmoji s1'>☀️</span><span class='sceneEmoji s2'>🌧️</span><span class='sceneEmoji s4'>🍃</span>",fore:"<div class='foreLine back'>🌿 💧 🌿 ☂️ 🌿 💧 🌿</div><div class='foreLine'>🌼 🍃 🌧️ 🌻 ☀️ 🍃 🌼</div>"}
  };
  return scenes[id]||scenes.uni;
}
function setScene(){
  const s=sceneFor(lvl.id);
  stageLocked=true;
  sceneFx.innerHTML=s.fx;
  foreground.innerHTML=s.fore;
  stageIntro.className="";
  stageIntro.innerHTML=`<b>${levelTitle(lvl)}</b><small>${s.tip}</small>`;
  void stageIntro.offsetWidth;
  stageIntro.classList.add("show");
  clearTimeout(window.stageIntroTimer);
  window.stageIntroTimer=setTimeout(()=>{stageIntro.className="hidden";stageLocked=false;ensureLoop()},1900);
}
function completeSpark(){
  const s=sceneFor(lvl.id),b=document.createElement("div");
  b.className="completeBurst";
  b.innerHTML=`${lvl.vessel}<br><span style="font-size:.52em">${lvl.fullText}</span>`;
  game.appendChild(b);
  setTimeout(()=>b.remove(),1500);
}
function buildCollector(){
  goal.className="collector";
  let slots="";
  if(lvl.revealText){
    let found=0;
    slots=[...lvl.revealText].map(ch=>{
      if(ch===" ")return "<span>&nbsp;</span>";
      const visible=found++<score;
      return `<span class="${visible?"":"empty"}">${visible?ch:"_"}</span>`;
    }).join("");
  }else{
    for(let i=0;i<max;i++)slots+=`<span class="${i<score?"":"empty"}">${i<score?lvl.collectIcon:"○"}</span>`;
  }
  goal.innerHTML=`<div class="collectWrap"><div class="collectVessel ${score>=max?"full":""}">${lvl.vessel}</div><div class="collectText"><div class="collectTitle">${lvl.goalName}: ${score}/${max}</div><div class="collectSlots ${lvl.revealText?"circusWord":""}">${slots}</div><div class="collectHint">${score>=max?lvl.fullText:lvl.revealText?"Find popcorn og afslør navnet!":"Saml ting og fyld den op!"}</div></div></div>`;
}
function updateGoal(){document.getElementById("score").textContent=score;buildCollector();if(score>=max&&!won)win()}
function waterBubbles(){if(lvl.mode!=="swim")return;bubbleTimer++;if(bubbleTimer%18)return;let b=document.createElement("div"),s=12+Math.random()*24;b.className="bubble";b.style.width=s+"px";b.style.height=s+"px";b.style.left=(x-20+Math.random()*40)+"px";b.style.top=(y+20+Math.random()*20)+"px";game.appendChild(b);setTimeout(()=>b.remove(),3600)}
function clearEffectTimers(){effectTimers.forEach(clearTimeout);effectTimers=[];game.querySelectorAll(".firework,.bubble,.lightBeam,.completeBurst").forEach(el=>el.remove())}
function randomItemY(){const min=lvl.mode==="swim"?.22:.24,maxY=lvl.mode==="swim"?.78:.74;return H()*(min+Math.random()*(maxY-min))}
function load(){
  clearTimeout(finaleTimer);
  clearEffectTimers();
  lvl=playLevels[li]||levels[li];
  game.className=lvl.cls;
  setScene();
  document.getElementById("sun").textContent=lvl.id==="circus"?"🎪":lvl.id==="space"||lvl.id==="night"?"🌙":lvl.id==="water"?"🐬":lvl.id==="weather"?"🌦️":"☀️";
  document.getElementById("flowers").textContent=lvl.id==="cat"?"🌿 🧶 🌿 🐾 🌿 🧶 🌿 🐾 🌿":lvl.id==="uni"?"🌸 🌼 🌷 🌸 🌻 🌼 🌸 🌷 🌼 🌸":lvl.id==="cheetah"?"🌾 🌵 🌾 🌼 🌾 🌵 🌾 🌼 🌾":lvl.id==="circus"?"🎈 🎪 🎟️ 🍦 🎈 🤹 🎪 🍧 🎈":lvl.id==="water"?"🐚 🫧 🪸 🐟 🐚 🫧 🪸 🐠 🫧":lvl.id==="space"?"✨ 🌟 🪐 ⭐ 💫 🌟 ✨ 🪐 ⭐":lvl.id==="weather"?"🌿 💧 ☂️ 🌼 🍃 🌧️ 🌻 ☀️":"🌲 ✨ 🪲 🌙 ⭐ 🌲 ✨ 🏮 🌙";
  player.textContent=lvl.player;
  player.classList.remove("hidden");
  player.classList.toggle("torchOn",lvl.id==="night");
  playerRadius=(parseFloat(getComputedStyle(player).fontSize)||80)*.34;
  document.getElementById("levelName").textContent=`Bane ${li+1}: ${levelTitle(lvl)}`;
  document.getElementById("who").textContent=diff.name;
  max=lvl.goal;
  document.getElementById("max").textContent=max;
  score=0;won=false;hitCd=false;bubbleTimer=0;
  swimTip.classList.toggle("hidden",lvl.mode!=="swim");
  darkness.classList.toggle("hidden",lvl.id!=="night");
  movie.classList.add("hidden");
  castle.classList.add("hidden");
  x=W()*.18;y=lvl.mode==="swim"?H()*.42:H()*.58;tx=x;ty=y;lastX=x;
  buildCollector();
  itemsEl.innerHTML="";badsEl.innerHTML="";items=[];bads=[];
  for(let i=0;i<diff.count;i++)spawnItem(W()*(.48+i*.21));
  lvl.hazards.forEach((h,i)=>spawnBad(h,W()+160+i*210));
  if(diff.name==="Edith")lvl.hazards.forEach((h,i)=>spawnBad(h,W()+420+i*180));
  updateGoal();
  ensureLoop();
}
function spawnItem(px){let e=document.createElement("div");e.className="thing";e.textContent=rand(lvl.items);itemsEl.appendChild(e);let r=(parseFloat(getComputedStyle(e).fontSize)||48)*.34;items.push({e,x:px,y:randomItemY(),s:(1.15+Math.random()*.5)*diff.speed,r})}
function spawnBad(h,px){let e=document.createElement("div");e.className="bad "+(h[1]=="car"?"car":h[1]=="bee"?"bee":"");e.textContent=h[0];badsEl.appendChild(e);let r=(parseFloat(getComputedStyle(e).fontSize)||50)*.34;bads.push({e,h,x:px,y:H()*(h[3]+Math.random()*(h[4]-h[3])),p:Math.random()*6.28,s:h[2]*diff.hazard,r})}
function choose(n){diff=diffs[n];playLevels=shuffle(levels);li=0;menu.classList.add("hidden");hud.classList.remove("hidden");started=true;unlockAudio();startMusic();load();show("Styr med fingeren ✨",2200)}
document.getElementById("willa").onclick=()=>choose("Willa");document.getElementById("edith").onclick=()=>choose("Edith");
function isUiEvent(e){return e.target&&e.target.closest&&e.target.closest("button,.overlay")}
function setTarget(cx,cy){if(!started||won||stageLocked||!complete.classList.contains("hidden"))return;let r=game.getBoundingClientRect();let newTx=Math.max(42,Math.min(W()-42,cx-r.left));if(Math.abs(newTx-x)>8)facing=newTx>x?1:-1;tx=newTx;ty=Math.max(H()*.16,Math.min(H()*.84,cy-r.top))}
game.addEventListener("pointerdown",e=>{if(isUiEvent(e)||!e.isPrimary)return;e.preventDefault();try{game.setPointerCapture(e.pointerId)}catch(err){}setTarget(e.clientX,e.clientY)});
game.addEventListener("pointermove",e=>{if(isUiEvent(e)||!e.isPrimary)return;if(e.pointerType!=="mouse"||e.buttons)setTarget(e.clientX,e.clientY)});
game.addEventListener("pointerup",e=>{try{game.releasePointerCapture(e.pointerId)}catch(err){}});
game.addEventListener("pointercancel",e=>{try{game.releasePointerCapture(e.pointerId)}catch(err){}});
function touching(o,bonus=0){const dx=o.x-x,dy=o.y-y,r=playerRadius+o.r+bonus;return dx*dx+dy*dy<r*r}
function collect(o){if(won||stageLocked)return;score=Math.min(max,score+1);updateGoal();pop(o.x,o.y,o.e.textContent);o.x=W()+90+Math.random()*220;o.y=randomItemY();o.e.textContent=rand(lvl.items);tone(620,.08,.05,"triangle");if(score==1)show(lvl.revealText?"Det første bogstav er fundet! ✨":`${lvl.goalName} begynder at blive fyldt! ✨`)}
function hit(){if(hitCd||won||stageLocked)return;hitCd=true;score=Math.max(0,score-diff.loss);updateGoal();avSound();show(lvl.hit||"AV!",900);player.style.filter="brightness(1.5)";if(lvl.mode==="swim")x=Math.max(60,x-25);setTimeout(()=>player.style.filter="",330);setTimeout(()=>hitCd=false,1500)}
function pop(x,y,emoji){for(let i=0;i<8;i++){let p=document.createElement("div");p.style.cssText=`position:absolute;left:${x+Math.random()*50-25}px;top:${y+Math.random()*40-20}px;z-index:90;font-size:24px;animation:boom .8s ease-out forwards`;p.textContent=i%2?emoji:"✨";game.appendChild(p);setTimeout(()=>p.remove(),850)}}
function fireworks(bursts=7,particles=22){
  const colors=["#ff5a7a","#ffb347","#fff45a","#77dd77","#6ec6ff","#b284ff","#fff"];
  for(let b=0;b<bursts;b++)effectTimers.push(setTimeout(()=>{
    let cx=Math.random()*W(),cy=H()*(.12+Math.random()*.38);
    for(let i=0;i<particles;i++){
      let p=document.createElement("div");p.className="firework";p.style.left=cx+"px";p.style.top=cy+"px";p.style.background=colors[i%colors.length];
      let a=Math.random()*Math.PI*2,d=55+Math.random()*110;p.style.setProperty("--dx",Math.cos(a)*d+"px");p.style.setProperty("--dy",Math.sin(a)*d+"px");game.appendChild(p);setTimeout(()=>p.remove(),950);
    }
  },b*300));
}
function win(){
  won=true;
  saveCards(lvl.unlocks);
  completeSpark();
  fireworks();
  document.getElementById("doneTitle").textContent=lvl.win;
  document.getElementById("doneText").textContent=li<playLevels.length-1?"Du har låst nye ting op i dyrebogen.":"Du har klaret alle baner!";
  document.getElementById("next").textContent=li<playLevels.length-1?"Næste bane":"Se eventyrslottet";
  effectTimers.push(setTimeout(()=>complete.classList.remove("hidden"),1100));
}
function showFinale(){
  clearEffectTimers();
  started=false;won=true;stageLocked=true;
  game.className="finale";
  hud.classList.add("hidden");swimTip.classList.add("hidden");darkness.classList.add("hidden");player.classList.add("hidden");player.classList.remove("torchOn");
  itemsEl.innerHTML="";badsEl.innerHTML="";items=[];bads=[];sceneFx.innerHTML="";foreground.innerHTML="";stageIntro.className="hidden";
  document.getElementById("sun").textContent="✨";
  document.getElementById("flowers").textContent="🌸 💖 🌼 ⭐ 🌷 💜 🌸 🩷 🌼 💖";
  goal.className="";
  goal.innerHTML='<span class="letter" style="color:white;text-shadow:0 4px 0 #ff91deaa,0 8px 18px #5a2a9a66">❤️ Mor&nbsp;&nbsp;❤️ Far<br>💜 Edith&nbsp;&nbsp;🩷 Willa</span>';
  castle.classList.remove("hidden");
  for(let i=0;i<7;i++){let b=document.createElement("div");b.className="lightBeam";b.style.setProperty("--rot",(-45+i*15)+"deg");game.appendChild(b);setTimeout(()=>b.remove(),7000)}
  fireworks(8,24);effectTimers.push(setTimeout(()=>fireworks(6,20),1200));effectTimers.push(setTimeout(()=>fireworks(6,20),2400));
  show("Mor og far elsker Edith og Willa ❤️",4200);
  finaleTimer=setTimeout(showMovie,5200);
}
document.getElementById("next").onclick=()=>{
  complete.classList.add("hidden");
  if(li<playLevels.length-1){li++;load();show(lvl.mode==="swim"?"Styr svømmeren med fingeren 🫧":"Ny bane! ✨",2200)}else showFinale();
};
async function playPrizeVideo(){
  stopMusicForPrize();
  if(!prizeVideo||!videoAvailable)return false;
  try{
    movieStatus.classList.add("hidden");
    prizeVideo.currentTime=0;prizeVideo.volume=.9;
    await prizeVideo.play();
    movie.classList.add("hasVideo");
    moviePlay.classList.add("hidden");
    return true;
  }catch(e){
    movie.classList.remove("hasVideo");
    movieStatus.textContent="Filmen kunne ikke starte. Den animerede præmie vises i stedet.";
    movieStatus.classList.remove("hidden");
    return false;
  }
}
if(prizeVideo){
  prizeVideo.addEventListener("loadedmetadata",()=>{videoAvailable=true});
  prizeVideo.addEventListener("error",()=>{videoAvailable=false;movie.classList.remove("hasVideo");moviePlay.classList.add("hidden");movieStatus.textContent="Præmiefilmen blev ikke fundet. Den animerede præmie vises i stedet.";movieStatus.classList.remove("hidden")});
}
function showMovie(){
  clearTimeout(finaleTimer);finaleTimer=0;stopMusicForPrize();
  movie.classList.remove("hidden","hasVideo");
  if(prizeVideo){prizeVideo.pause();try{prizeVideo.currentTime=0}catch(e){}}
  moviePlay.classList.toggle("hidden",!videoAvailable);
  movieStatus.classList.toggle("hidden",videoAvailable);
  fireworks(5,18);
}
moviePlay.onclick=playPrizeVideo;
document.getElementById("movieAgain").onclick=()=>{if(videoAvailable){playPrizeVideo()}else{movie.classList.add("hidden");void movie.offsetWidth;movie.classList.remove("hidden");fireworks(4,16)}};
function goToMenu(){
  clearTimeout(finaleTimer);finaleTimer=0;clearEffectTimers();
  if(prizeVideo){prizeVideo.pause();try{prizeVideo.currentTime=0}catch(e){}}
  stopMusicForPrize();started=false;won=true;stageLocked=false;
  movie.classList.add("hidden");complete.classList.add("hidden");book.classList.add("hidden");menu.classList.remove("hidden");hud.classList.add("hidden");swimTip.classList.add("hidden");darkness.classList.add("hidden");player.classList.add("hidden");
  itemsEl.innerHTML="";badsEl.innerHTML="";items=[];bads=[];
}
document.getElementById("movieMenu").onclick=goToMenu;
document.getElementById("menuBtn").onclick=goToMenu;
document.getElementById("bookBtn").onclick=()=>{let s=loadProgress(),g=document.getElementById("bookGrid");g.innerHTML="";cards.forEach(c=>{let d=document.createElement("div");d.innerHTML=(s.cards.includes(c[0])?c[0]:"❔")+`<small>${s.cards.includes(c[0])?c[1]:"Ikke fundet"}</small>`;g.appendChild(d)});menu.classList.add("hidden");book.classList.remove("hidden")};
document.getElementById("back").onclick=()=>{book.classList.add("hidden");menu.classList.remove("hidden")};
function updatePlayer(){if(started&&!won){let ease=lvl&&lvl.mode==="swim"?.14:.10;x+=(tx-x)*ease;y+=(ty-y)*ease;y=Math.max(H()*.16,Math.min(H()*.84,y))}}
function ensureLoop(){if(!rafId&&started&&!won)rafId=requestAnimationFrame(loop)}
function loop(){
  rafId=0;
  if(!started||won)return;
  if(!stageLocked){
    updatePlayer();waterBubbles();
    items.forEach(o=>{
      o.x-=o.s;
      if(o.x<-60){o.x=W()+90+Math.random()*240;o.y=randomItemY();o.e.textContent=rand(lvl.items)}
      o.e.style.left=o.x+"px";o.e.style.top=o.y+"px";
      if(touching(o))collect(o);
    });
    bads.forEach(o=>{
      o.p+=.035;o.x-=o.s;
      if(o.h[1]==="bee"||o.h[1]==="fly")o.y+=Math.sin(o.p)*(lvl.id==="circus"?2.4:lvl.mode==="swim"?1.8:1.1);
      if(lvl.id==="circus")o.x+=Math.sin(o.p*.7)*.8;
      if(o.x<-90){o.x=W()+120+Math.random()*260;o.y=H()*(o.h[3]+Math.random()*(o.h[4]-o.h[3]))}
      o.e.style.left=o.x+"px";o.e.style.top=o.y+"px";
      if(touching(o,3))hit();
    });
  }
  if(Math.abs(x-lastX)>.4)facing=x>lastX?1:-1;lastX=x;
  player.style.left=x+"px";player.style.top=y+"px";
  if(lvl&&lvl.id==="night"){darkness.style.setProperty("--lx",(x+(facing>0?24:-24))+"px");darkness.style.setProperty("--ly",(y-6)+"px")}
  player.style.transform="translate(-50%,-50%) scaleX("+facing+")";
  if(started&&!won)rafId=requestAnimationFrame(loop);
}
function clampWorld(){
  const minX=42,maxX=Math.max(minX,W()-42),minY=H()*.16,maxY=H()*.84;
  x=Math.max(minX,Math.min(maxX,x));tx=Math.max(minX,Math.min(maxX,tx));y=Math.max(minY,Math.min(maxY,y));ty=Math.max(minY,Math.min(maxY,ty));
  if(!player.classList.contains("hidden"))playerRadius=(parseFloat(getComputedStyle(player).fontSize)||80)*.34;
  items.forEach(o=>{o.y=Math.max(minY,Math.min(maxY,o.y));if(o.x>W()+600)o.x=W()+120+Math.random()*220});
  bads.forEach(o=>{o.y=Math.max(minY,Math.min(maxY,o.y));if(o.x>W()+800)o.x=W()+180+Math.random()*240});
  ensureLoop();
}
window.addEventListener("resize",clampWorld);
window.addEventListener("orientationchange",()=>setTimeout(clampWorld,120));
</script>
