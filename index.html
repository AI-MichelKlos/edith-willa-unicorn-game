<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Edith & Willas Fingervenlige Enhjørninge-eventyr</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;width:100%;height:100%;overflow:hidden;touch-action:none}
body{font-family:"Comic Sans MS","Trebuchet MS",Arial,sans-serif;background:#91ddff}
#game{position:relative;width:100vw;height:100dvh;overflow:hidden;background:radial-gradient(circle at 12% 11%,#fff 0 2.4%,transparent 2.7%),radial-gradient(circle at 18% 9%,#fff 0 3.4%,transparent 3.7%),radial-gradient(circle at 84% 14%,#fff 0 3.8%,transparent 4.1%),linear-gradient(#85d8ff 0%,#d6f8ff 54%,#aaf0a6 55%,#66c86b 100%)}
#sun{position:absolute;right:8vw;top:7vh;font-size:64px;z-index:1;animation:bob 3.4s infinite alternate ease-in-out}
#rainbow{position:absolute;left:-17vw;top:11vh;width:134vw;height:48vh;border-radius:50% 50% 0 0;opacity:.62;z-index:1;background:conic-gradient(from 270deg at 50% 100%,#ff5a7a 0 10deg,#ffb347 10deg 20deg,#fff45a 20deg 30deg,#77dd77 30deg 40deg,#6ec6ff 40deg 50deg,#b284ff 50deg 60deg,transparent 60deg 300deg,#ff5a7a 300deg 310deg,#ffb347 310deg 320deg,#fff45a 320deg 330deg,#77dd77 330deg 340deg,#6ec6ff 340deg 350deg,#b284ff 350deg 360deg)}
.cloud{position:absolute;z-index:2;font-size:48px;opacity:.85;animation:drift 24s linear infinite}
#cloud1{top:18vh;left:-20vw}#cloud2{top:27vh;left:-45vw;animation-duration:31s;font-size:38px}
@keyframes drift{from{transform:translateX(0)}to{transform:translateX(145vw)}}@keyframes bob{from{transform:translateY(-5px)}to{transform:translateY(5px)}}
.hill{position:absolute;bottom:-8vh;width:74vw;height:26vh;border-radius:50% 50% 0 0;background:#55bd63;z-index:2}
#hill1{left:-16vw}#hill2{right:-20vw;bottom:-4vh;background:#46aa58}
#flowers{position:absolute;left:0;bottom:3vh;width:100%;z-index:3;font-size:28px;opacity:.8;white-space:nowrap}
#backgroundNames{position:absolute;left:50%;top:33%;transform:translate(-50%,-50%);width:100%;text-align:center;z-index:2;pointer-events:none;font-size:clamp(44px,14vw,100px);font-weight:bold;letter-spacing:.03em;line-height:1.05}
.letterWrap{position:relative;display:inline-block;color:#ffffff24;text-shadow:0 2px 8px #7c3cff22;margin:0 .01em}
.letterFill{position:absolute;inset:0;opacity:0;color:#fff;text-shadow:0 4px 0 #ff91de99,0 8px 18px #5a2a9a55;transform:scale(.65) translateY(18px);transition:opacity .55s,transform .55s}
.letterFill.show{opacity:1;transform:scale(1) translateY(0)}
#player{position:absolute;left:12vw;top:57vh;font-size:clamp(58px,17vw,98px);z-index:10;transform:translate(-50%,-50%);transition:filter .2s}
#dragon{position:absolute;left:80vw;top:45vh;font-size:clamp(44px,12vw,78px);z-index:9;transform:scaleX(-1);filter:saturate(.9);opacity:.95}
.thing{position:absolute;font-size:clamp(34px,9vw,54px);z-index:8;animation:bob 1.8s infinite ease-in-out alternate}
#ui{position:absolute;top:max(10px,env(safe-area-inset-top));left:10px;z-index:30;background:#ffffffcc;color:#6b3fa0;padding:9px 12px;border-radius:18px;font-weight:bold;font-size:18px;box-shadow:0 4px 10px #0002}
#message{position:absolute;left:50%;top:13%;transform:translateX(-50%);z-index:35;display:none;background:#fff9;color:#8a3ffc;padding:12px 18px;border-radius:22px;font-size:clamp(21px,6vw,36px);font-weight:bold;text-align:center;text-shadow:0 2px #fff}
#start{position:absolute;inset:0;z-index:60;display:flex;align-items:center;justify-content:center;text-align:center;background:linear-gradient(#ffd6f5dd,#d8f7ffdd)}
#start button{font-size:clamp(25px,8vw,44px);border:0;border-radius:30px;padding:22px 28px;background:#fff;color:#9047ff;font-weight:bold;box-shadow:0 8px 24px #0003}
#hint{position:absolute;bottom:max(18px,env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);z-index:40;color:#7a40d8;background:#ffffffaa;border-radius:18px;padding:8px 14px;font-weight:bold;text-align:center}
.firework{position:absolute;width:8px;height:8px;border-radius:50%;z-index:55;pointer-events:none;animation:boom .95s ease-out forwards}
@keyframes boom{from{transform:translate(0,0) scale(1);opacity:1}to{transform:translate(var(--dx),var(--dy)) scale(.4);opacity:0}}
</style>
</head>
<body>
<div id="game">
<div id="sun">☀️</div><div id="rainbow"></div><div class="cloud" id="cloud1">☁️ ☁️</div><div class="cloud" id="cloud2">☁️</div>
<div id="backgroundNames"></div><div class="hill" id="hill1"></div><div class="hill" id="hill2"></div><div id="flowers">🌸 🌼 🌷 🌸 🌻 🌼 🌸 🌷 🌼 🌸 🌻 🌷 🌸</div>
<div id="ui">⭐ <span id="score">0</span> / 10</div><div id="message">Styr med fingeren 🌈</div><div id="player">🦄</div><div id="dragon">🐉</div>
<div id="hint">Læg fingeren på skærmen og flyt enhjørningen</div>
<div id="start"><button>🦄 Start eventyret<br><span style="font-size:.55em">Find bogstaverne til Edith og Willa</span></button></div>
</div>
<script>
const game=document.getElementById("game"),player=document.getElementById("player"),dragon=document.getElementById("dragon"),scoreEl=document.getElementById("score"),message=document.getElementById("message"),start=document.getElementById("start"),backgroundNames=document.getElementById("backgroundNames");
const prizeText="Edith Willa",lettersOnly="EdithWilla",maxScore=lettersOnly.length;
let x=innerWidth*.18,y=innerHeight*.57,targetX=x,targetY=y,score=0,started=false,won=false,hitCooldown=false,audioCtx,musicTimer,dragonX=innerWidth*.86,dragonY=innerHeight*.45,dragonPhase=0,worldSpeed=1.45;
const things=[];
function buildNames(){backgroundNames.innerHTML="";prizeText.split("").forEach(ch=>{if(ch===" "){backgroundNames.appendChild(document.createElement("br"));return}const w=document.createElement("span");w.className="letterWrap";w.textContent=ch;const f=document.createElement("span");f.className="letterFill";f.textContent=ch;w.appendChild(f);backgroundNames.appendChild(w)})}
function updateLetters(){const fills=[...document.querySelectorAll(".letterFill")];fills.forEach((f,i)=>f.classList.toggle("show",i<score));if(score>=maxScore&&!won){won=true;showMessage("Hurra for Edith og Willa! 🎆",3600);startFireworks()}}
buildNames();updateLetters();
function makeAudio(){audioCtx=new (window.AudioContext||window.webkitAudioContext)();musicTimer=setInterval(()=>{if(started){const n=[392,523,587,659,784,659,523];tone(n[Math.floor(Math.random()*n.length)],.13,.018)}},950)}
function tone(freq,dur=.12,vol=.05,type="sine"){if(!audioCtx)return;const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=type;o.frequency.value=freq;g.gain.value=vol;o.connect(g);g.connect(audioCtx.destination);o.start();g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+dur);o.stop(audioCtx.currentTime+dur)}
function sparkle(){[784,988,1318].forEach((f,i)=>setTimeout(()=>tone(f,.08,.065),i*70))}
function ups(){tone(120,.18,.09,"sawtooth");setTimeout(()=>tone(170,.12,.05),120)}
function fireSound(){tone(110,.16,.10,"sawtooth");setTimeout(()=>tone(900,.08,.07),90);setTimeout(()=>tone(1300,.08,.06),150)}
function showMessage(t,ms=1400){message.textContent=t;message.style.display="block";clearTimeout(showMessage.t);showMessage.t=setTimeout(()=>message.style.display="none",ms)}
function spawnThing(xp=innerWidth+80){const el=document.createElement("div");el.className="thing";const emojis=["⭐","⭐","⭐","💖","🌸","🦋"];el.textContent=emojis[Math.floor(Math.random()*emojis.length)];el.style.left=xp+"px";el.style.top=innerHeight*(.26+Math.random()*.48)+"px";game.appendChild(el);things.push(el)}
for(let i=0;i<6;i++)spawnThing(innerWidth*(.40+i*.23));
function moveTarget(clientX,clientY){if(!started)return;targetX=Math.max(40,Math.min(innerWidth-40,clientX));targetY=Math.max(innerHeight*.22,Math.min(innerHeight*.80,clientY))}
game.addEventListener("touchstart",e=>{e.preventDefault();moveTarget(e.touches[0].clientX,e.touches[0].clientY)},{passive:false});
game.addEventListener("touchmove",e=>{e.preventDefault();moveTarget(e.touches[0].clientX,e.touches[0].clientY)},{passive:false});
game.addEventListener("mousedown",e=>moveTarget(e.clientX,e.clientY));
game.addEventListener("mousemove",e=>{if(e.buttons)moveTarget(e.clientX,e.clientY)});
start.querySelector("button").onclick=async()=>{started=true;start.style.display="none";if(!audioCtx)makeAudio();if(audioCtx.state==="suspended")await audioCtx.resume();showMessage("Styr med fingeren ✨",2100);sparkle()};
function collect(el){if(won)return;score=Math.min(maxScore,score+1);scoreEl.textContent=score;updateLetters();sparkle();el.style.left=innerWidth+70+"px";el.style.top=innerHeight*(.26+Math.random()*.48)+"px";if(score===1)showMessage("Et bogstav kom frem! ✨");if(score===5)showMessage("Edith er fremme! 💖")}
function dragonHit(){if(hitCooldown||!started||won)return;hitCooldown=true;score=Math.max(0,score-1);scoreEl.textContent=score;updateLetters();ups();showMessage("Ups! Dragen gemte et bogstav 🐉",1500);player.style.filter="brightness(1.45)";setTimeout(()=>player.style.filter="",330);setTimeout(()=>hitCooldown=false,1700)}
function startFireworks(){for(let i=0;i<10;i++)setTimeout(()=>{fireSound();burst(Math.random()*innerWidth,innerHeight*(.10+Math.random()*.38))},i*420)}
function burst(cx,cy){const colors=["#ff5a7a","#ffb347","#fff45a","#77dd77","#6ec6ff","#b284ff","#ffffff"];for(let i=0;i<36;i++){const p=document.createElement("div");p.className="firework";p.style.left=cx+"px";p.style.top=cy+"px";p.style.background=colors[Math.floor(Math.random()*colors.length)];const a=Math.random()*Math.PI*2,d=55+Math.random()*100;p.style.setProperty("--dx",Math.cos(a)*d+"px");p.style.setProperty("--dy",Math.sin(a)*d+"px");game.appendChild(p);setTimeout(()=>p.remove(),980)}}
function loop(){if(started){x+=(targetX-x)*.09;y+=(targetY-y)*.09;dragonPhase+=.018;dragonX-=.78;dragonY=innerHeight*(.34+.24*(Math.sin(dragonPhase)*.5+.5));if(dragonX<-90)dragonX=innerWidth+120;things.forEach(el=>{let lx=parseFloat(el.style.left)-worldSpeed;el.style.left=lx+"px";if(lx<-70){el.style.left=innerWidth+80+Math.random()*150+"px";el.style.top=innerHeight*(.26+Math.random()*.48)+"px"}const r=el.getBoundingClientRect();if(Math.abs((r.left+r.width/2)-x)<54&&Math.abs((r.top+r.height/2)-y)<54)collect(el)});const dr=dragon.getBoundingClientRect();if(Math.abs((dr.left+dr.width/2)-x)<58&&Math.abs((dr.top+dr.height/2)-y)<56)dragonHit()}player.style.left=x+"px";player.style.top=y+"px";dragon.style.left=dragonX+"px";dragon.style.top=dragonY+"px";requestAnimationFrame(loop)}
loop();
</script>
</body>
</html>
