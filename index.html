#hud{position:absolute;top:max(10px,env(safe-area-inset-top));left:10px;background:#ffffffcc;color:#6b3fa0;padding:9px 13px;border-radius:18px;font-weight:bold;font-size:18px;z-index:50;box-shadow:0 4px 10px #0002}#hud small{display:block;color:#8a3ffc}.msg{position:absolute;left:50%;top:13%;transform:translateX(-50%);background:#fff9;color:#8a3ffc;padding:12px 18px;border-radius:22px;font-size:clamp(21px,6vw,36px);font-weight:bold;text-align:center;z-index:80}
.overlay{position:absolute;inset:0;background:linear-gradient(#ffd6f5dd,#d8f7ffdd);display:flex;align-items:center;justify-content:center;text-align:center;z-index:100}.card{width:min(92vw,520px);background:#ffffffdd;border-radius:32px;padding:24px;box-shadow:0 12px 35px #0004;color:#7438ca}.btn{border:0;border-radius:28px;background:white;color:#9047ff;font-weight:bold;box-shadow:0 8px 24px #0003;touch-action:manipulation;pointer-events:auto;font-size:clamp(22px,7vw,38px);padding:16px 24px;margin:8px;min-width:220px;position:relative;z-index:101}.small{font-size:20px;padding:12px 18px}.pink{background:#ffe6f6}.purple{background:#eee3ff}
.firework{position:absolute;width:8px;height:8px;border-radius:50%;z-index:90;pointer-events:none;animation:boom .9s ease-out forwards}@keyframes boom{from{transform:translate(0,0);opacity:1}to{transform:translate(var(--dx),var(--dy)) scale(.35);opacity:0}}#castle{position:absolute;left:50%;top:43%;transform:translate(-50%,-50%);font-size:clamp(100px,28vw,190px);z-index:12;filter:drop-shadow(0 10px 12px #0003)}.book{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:16px 0}.book div{background:#fff;border-radius:18px;padding:12px;font-size:38px;box-shadow:0 4px 12px #0002}.book small{display:block;font-size:13px;color:#7a40d8}.hidden{display:none!important}
#game.circus{background:radial-gradient(circle at 20% 16%,#fff8 0 3%,transparent 3.5%),radial-gradient(circle at 75% 12%,#fff8 0 4%,transparent 4.5%),linear-gradient(120deg,#39227d 0%,#7940c9 24%,#d75fc5 45%,#ffb347 70%,#ff6f61 100%);background-size:180% 180%;animation:circusFlow 8s ease-in-out infinite}#game.space{background:radial-gradient(circle at 20% 20%,#fff 0 1.2%,transparent 1.5%),radial-gradient(circle at 80% 14%,#fff 0 1%,transparent 1.3%),linear-gradient(#1a1b5d 0%,#59308d 48%,#27336d 49%,#14193f 100%)}@keyframes circusFlow{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

/* Version 2.1: skåle/kister og mobilvenlig svømmebane */
#game.water{background:radial-gradient(circle at 20% 18%,#fff8 0 2%,transparent 2.5%),radial-gradient(circle at 72% 28%,#fff7 0 1.8%,transparent 2.2%),linear-gradient(#7ee8ff 0%,#46bff3 22%,#1688cf 64%,#0c5f9b 100%)}
#game.water .ground{background:#d8b16a;height:18vh;bottom:-5vh}
#game.water .rainbow{opacity:.16}
#goal.collector{top:19%;z-index:45;pointer-events:none}
.collectWrap{display:inline-flex;align-items:center;gap:10px;max-width:94vw;background:#ffffffb8;border:3px solid #fff;border-radius:28px;padding:9px 12px;box-shadow:0 8px 20px #0002;color:#7438ca;text-shadow:none}
.collectVessel{font-size:clamp(38px,12vw,72px);filter:drop-shadow(0 4px 5px #0002);animation:bob 1.6s infinite alternate}
.collectText{display:flex;flex-direction:column;align-items:flex-start;gap:4px}
.collectTitle{font-size:clamp(16px,4.6vw,28px);line-height:1;font-weight:bold}
.collectSlots{letter-spacing:1px;font-size:clamp(17px,5vw,32px);line-height:1.05;max-width:68vw;overflow:hidden;white-space:nowrap}
.collectSlots .empty{opacity:.25;filter:grayscale(1)}
.collectHint{font-size:clamp(13px,3.8vw,20px);line-height:1;color:#6b3fa0}
#hud{max-width:calc(100vw - 20px)}
.swimTip{position:absolute;right:10px;bottom:max(12px,env(safe-area-inset-bottom));z-index:55;background:#ffffffc9;color:#1169a8;border-radius:22px;padding:10px 14px;font-weight:bold;font-size:clamp(14px,4.2vw,20px);box-shadow:0 6px 14px #0002}
.bubble{position:absolute;border-radius:50%;background:#ffffff66;border:2px solid #ffffffaa;z-index:7;animation:bubbleUp 3.5s linear forwards;pointer-events:none}
@keyframes bubbleUp{from{transform:translateY(0) scale(.7);opacity:.75}to{transform:translateY(-58vh) scale(1.25);opacity:0}}


/* Version 2.2: flottere eventyrslot til slutningen */
#castle{
  position:absolute;
  left:50%;
  top:43%;
  transform:translate(-50%,-50%);
  width:min(60vw,310px);
  height:min(50vw,250px);
  font-size:initial!important;
  z-index:30!important;
  pointer-events:none;
  filter:drop-shadow(0 14px 18px rgba(79,34,122,.28)) drop-shadow(0 0 28px rgba(255,255,255,.55));

}
#castle .castle-rainbow{

  left:50%;
  top:-2%;
  transform:translateX(-50%);
  width:88%;
  height:42%;

  background:linear-gradient(90deg,#ff8bcf 0%,#ffc95c 19%,#a6ee79 38%,#77ddff 58%,#a78cff 79%,#ff8bcf 100%);

}

  content:"";
  position:absolute;
  left:50%;
  bottom:-74%;
  transform:translateX(-50%);
  width:72%;
  height:150%;
  border-radius:50%;
  background:rgba(255,255,255,.75);
}
#castle .castle-stars span{
  position:absolute;
  z-index:2;
  filter:drop-shadow(0 0 10px rgba(255,255,255,.85));
  animation:sparkleTwinkle 1.9s ease-in-out infinite;
}
#castle .s1{left:10%;top:7%;font-size:18px}
#castle .s2{left:26%;top:1%;font-size:16px;animation-delay:-.6s}
#castle .s3{right:24%;top:3%;font-size:17px;animation-delay:-1.1s}
#castle .s4{right:9%;top:10%;font-size:15px;animation-delay:-.2s}
#castle .s5{left:50%;top:-1%;font-size:17px;transform:translateX(-50%);animation-delay:-1.4s}
#castle .castle-cloud{
  position:absolute;
  top:17%;

  opacity:.92;
  z-index:1;

}
#castle .cloud-left{left:-4%}
#castle .cloud-right{right:-4%;animation-delay:-1.3s}
#castle .castle-body{
  position:absolute;
  left:50%;
  bottom:13%;
  transform:translateX(-50%);
  width:84%;
  height:68%;
}
#castle .tower,
#castle .main{
  position:absolute;
  bottom:0;
  background:linear-gradient(#fff6ff 0%,#f7d5ff 58%,#e9c0ff 100%);
  border:4px solid #c76cf0;
  box-shadow:inset 0 4px 0 rgba(255,255,255,.8), inset 0 -8px 0 rgba(214,150,255,.55);
}
#castle .tower{
  width:24%;
  height:60%;
  border-radius:22px 22px 10px 10px;
}
#castle .tower.left{left:0}
#castle .tower.right{right:0}
#castle .tower.center{
  left:50%;
  transform:translateX(-50%);
  width:28%;
  height:78%;
  z-index:3;
}
#castle .main{
  left:50%;
  transform:translateX(-50%);
  width:66%;
  height:54%;
  border-radius:28px 28px 14px 14px;
}
#castle .tower::before{
  content:"";
  position:absolute;
  left:50%;
  top:-28%;
  transform:translateX(-50%);
  width:5px;
  height:28%;
  border-radius:10px;
  background:linear-gradient(#fff6b6,#ffd463);
}
#castle .roof{
  position:absolute;
  left:50%;
  top:-22%;

}
#castle .tower.center .roof{
  border-left-width:26px;

}
#castle .flag{

  position:absolute;

}
#castle .main .window{
  top:26%;
}
#castle .main .win1{left:35%}
#castle .main .win2{left:65%}
#castle .door{
  position:absolute;
  left:50%;
  bottom:0;
  transform:translateX(-50%);
  width:26%;
  height:48%;
  border-radius:18px 18px 8px 8px;
  background:linear-gradient(#8f6040,#6b3b22);
  border:3px solid #ddb36d;
}
#castle .door::after{
  content:"";
  position:absolute;
  right:18%;
  top:58%;
  width:6px;
  height:6px;
  border-radius:50%;
  background:#ffe58c;
  box-shadow:0 0 8px rgba(255,229,140,.95);
}
#castle .gem{
  position:absolute;
  left:50%;
  top:6%;
  transform:translateX(-50%);
  font-size:18px;
  filter:drop-shadow(0 0 8px rgba(255,255,255,.95));
}
#castle .castle-path{
  position:absolute;
  left:50%;
  bottom:4%;
  transform:translateX(-50%);
  width:34%;
  height:14%;
  background:linear-gradient(#fff1c2,#ffd473);
  border-radius:70% 70% 12px 12px;
  opacity:.94;
  box-shadow:0 6px 18px rgba(255,215,120,.35);
}
@keyframes castleFloat{
  from{transform:translate(-50%,-50%) translateY(-4px)}
  to{transform:translate(-50%,-50%) translateY(7px)}
}
@keyframes castleGlowFancy{
  from{filter:drop-shadow(0 14px 18px rgba(79,34,122,.28)) drop-shadow(0 0 22px rgba(255,255,255,.5))}
  to{filter:drop-shadow(0 18px 22px rgba(79,34,122,.38)) drop-shadow(0 0 42px rgba(255,255,255,.9)) drop-shadow(0 0 55px rgba(130,214,255,.55))}
}
@keyframes sparkleTwinkle{
  0%,100%{transform:scale(.9) rotate(-8deg);opacity:.7}
  50%{transform:scale(1.18) rotate(8deg);opacity:1}
}
@keyframes cloudDrift{
  from{transform:translateX(-4px) translateY(0)}
  to{transform:translateX(8px) translateY(4px)}
}
@keyframes flagWave{
  0%,100%{transform:translateX(4px) rotate(0deg)}
  50%{transform:translateX(6px) rotate(10deg)}
}
@media (max-width:480px){
  #castle{width:min(72vw,290px);height:min(58vw,240px)}
  #castle .castle-cloud{font-size:26px}
}


/* Version 2.3: præmie-tegnefilm til slutningen */
#movie.overlay{

let diff,li=0,lvl,playLevels=[],score=0,max=0,won=false,started=false,hitCd=false,x=innerWidth*.18,y=innerHeight*.58,tx=x,ty=y,items=[],bads=[],musicStarted=false,facing=1,lastX=x,swimPress=false,vy=0,bubbleTimer=0;

let sfxCtx=null;function tone(f,d=.12,v=.08,type="sine"){try{sfxCtx=sfxCtx||new(window.AudioContext||window.webkitAudioContext)();let o=sfxCtx.createOscillator(),g=sfxCtx.createGain();o.type=type;o.frequency.value=f;g.gain.value=v;o.connect(g);g.connect(sfxCtx.destination);o.start();g.gain.exponentialRampToValueAtTime(.001,sfxCtx.currentTime+d);o.stop(sfxCtx.currentTime+d)}catch(e){}}

document.getElementById("back").onclick=()=>{book.classList.add("hidden");menu.classList.remove("hidden")};
function updatePlayer(){if(started&&!won){let ease=lvl&&lvl.mode==="swim"?.14:.10;x+=(tx-x)*ease;y+=(ty-y)*ease;y=Math.max(H()*.16,Math.min(H()*.84,y))}}
function loop(){if(started&&!won){updatePlayer();waterBubbles();items.forEach(o=>{o.x-=o.s;if(o.x<-60){o.x=W()+90+Math.random()*240;let min=lvl.mode==="swim"?.22:.24,span=lvl.mode==="swim"?.56:.52;o.y=H()*(min+Math.random()*span);o.e.textContent=rand(lvl.items)}o.e.style.left=o.x+"px";o.e.style.top=o.y+"px";if(Math.abs(o.x-x)<55&&Math.abs(o.y-y)<55)collect(o)});bads.forEach(o=>{o.p+=.035;o.x-=o.s;if(o.h[1]=="bee"||o.h[1]=="fly")o.y+=Math.sin(o.p)*(lvl.id==="circus"?2.4:lvl.mode==="swim"?1.8:1.1);if(lvl.id==="circus")o.x+=Math.sin(o.p*0.7)*0.8;if(o.x<-90){o.x=W()+120+Math.random()*260;o.y=H()*(o.h[3]+Math.random()*(o.h[4]-o.h[3]))}o.e.style.left=o.x+"px";o.e.style.top=o.y+"px";if(Math.abs(o.x-x)<58&&Math.abs(o.y-y)<58)hit()})}
if(Math.abs(x-lastX)>.4)facing=x>lastX?1:-1;lastX=x;player.style.left=x+"px";player.style.top=y+"px";let tilt=lvl&&lvl.mode==="swim"?" rotate("+Math.max(-18,Math.min(18,vy*3))+"deg)":"";player.style.transform="translate(-50%,-50%) scaleX("+facing+")"+tilt;requestAnimationFrame(loop)}
loop();
</script>
