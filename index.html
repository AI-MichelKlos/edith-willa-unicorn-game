<!DOCTYPE html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Edith &amp; Willa Enhjørningespil</title>
  <style>
    /* Fix 5: user-select:none forhindrer tekst-markering/systemmenu ved lang-tryk */
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
    /* Fix 2: overscroll-behavior:none stopper iOS bounce/overscroll */
    html,body{margin:0;width:100%;height:100%;overflow:hidden;touch-action:none;overscroll-behavior:none}
    body{font-family:"Comic Sans MS",Arial,sans-serif;background:#8edcff}
    #game{position:relative;width:100vw;height:100dvh;overflow:hidden;background:linear-gradient(#84d9ff 0%,#d8f8ff 55%,#8ee08f 56%,#56bd60 100%)}
    #rainbow{position:absolute;left:-20vw;top:8vh;width:140vw;height:52vh;border-radius:50% 50% 0 0;opacity:.65;background:conic-gradient(from 270deg at 50% 100%,#ff5a7a 0 10deg,#ffb347 10deg 20deg,#fff45a 20deg 30deg,#77dd77 30deg 40deg,#6ec6ff 40deg 50deg,#b284ff 50deg 60deg,transparent 60deg 300deg,#ff5a7a 300deg 310deg,#ffb347 310deg 320deg,#fff45a 320deg 330deg,#77dd77 330deg 340deg,#6ec6ff 340deg 350deg,#b284ff 350deg 360deg)}
    #sun{position:absolute;right:8vw;top:6vh;font-size:62px;animation:bob 3s infinite alternate}
    .cloud{position:absolute;font-size:46px;opacity:.85;animation:drift 25s linear infinite}
    #cloud1{top:17vh;left:-30vw}#cloud2{top:27vh;left:-60vw;animation-duration:34s}
    @keyframes drift{to{transform:translateX(150vw)}}@keyframes bob{from{transform:translateY(-5px)}to{transform:translateY(5px)}}
    .hill{position:absolute;bottom:-7vh;width:75vw;height:25vh;border-radius:50% 50% 0 0;background:#54bd62}
    #hill1{left:-18vw}#hill2{right:-22vw;background:#47aa58}
    #flowers{position:absolute;bottom:3vh;width:100%;font-size:28px;white-space:nowrap;opacity:.8}
    #names{position:absolute;left:50%;top:33%;transform:translate(-50%,-50%);width:100%;text-align:center;font-size:clamp(46px,14vw,96px);font-weight:bold;line-height:1.05;pointer-events:none}
    .letter{position:relative;display:inline-block;color:#ffffff30;text-shadow:0 2px 8px #7540cc33}
    .fill{position:absolute;inset:0;color:white;opacity:0;transform:scale(.6) translateY(18px);transition:.45s;text-shadow:0 4px 0 #ff91deaa,0 8px 18px #5a2a9a66}
    .fill.show{opacity:1;transform:scale(1) translateY(0)}
    #player{position:absolute;font-size:clamp(60px,17vw,98px);z-index:10;transform:translate(-50%,-50%)}
    #dragon{position:absolute;font-size:clamp(46px,13vw,82px);z-index:9;transform:scaleX(-1)}
    .item{position:absolute;font-size:clamp(36px,9vw,54px);z-index:8;animation:bob 1.6s infinite alternate}
    /* Fix 6: safe-area-inset pa bade top og left */
    #ui{position:absolute;top:max(10px,env(safe-area-inset-top));left:max(10px,env(safe-area-inset-left));background:#ffffffcc;color:#6b3fa0;padding:9px 13px;border-radius:18px;font-weight:bold;font-size:18px;z-index:30}
    #msg{position:absolute;left:50%;top:13%;transform:translateX(-50%);display:none;background:#fff9;color:#8a3ffc;padding:12px 18px;border-radius:22px;font-size:clamp(21px,6vw,36px);font-weight:bold;text-align:center;z-index:40}
    #hint{position:absolute;bottom:max(18px,env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);background:#ffffffaa;color:#7a40d8;border-radius:18px;padding:8px 14px;font-weight:bold;text-align:center;z-index:35}
    #start{position:absolute;inset:0;background:linear-gradient(#ffd6f5dd,#d8f7ffdd);display:flex;align-items:center;justify-content:center;text-align:center;z-index:60}
    #start button{font-size:clamp(25px,8vw,44px);border:0;border-radius:30px;padding:22px 28px;background:white;color:#9047ff;font-weight:bold;box-shadow:0 8px 24px #0003}
    .firework{position:absolute;width:8px;height:8px;border-radius:50%;z-index:55;pointer-events:none;animation:boom .9s ease-out forwards}
    @keyframes boom{from{transform:translate(0,0);opacity:1}to{transform:translate(var(--dx),var(--dy)) scale(.35);opacity:0}}
    </style>
  </head>
  <body>
    <div id="game">
      <div id="rainbow"></div>div>
      <div id="sun">&#x2600;&#xFE0F;</div>div>
      <div class="cloud" id="cloud1">&#x2601;&#xFE0F; &#x2601;&#xFE0F;</div>div>
      <div class="cloud" id="cloud2">&#x2601;&#xFE0F;</div>div>
      <div id="names"></div>div>
      <div class="hill" id="hill1"></div>div>
      <div class="hill" id="hill2"></div>div>
      <div id="flowers">&#x1F338; &#x1F33C; &#x1F337; &#x1F338; &#x1F33B; &#x1F33C; &#x1F338; &#x1F337; &#x1F33C; &#x1F338; &#x1F33B; &#x1F337;</div>div>
      <div id="ui">&#x2B50; <span id="score">0</span>span> / 10</div>div>
      <div id="msg">Styr med fingeren &#x1F308;</div>div>
      <div id="player">&#x1F984;</div>div>
      <div id="dragon">&#x1F409;</div>div>
      <div id="hint">&#x1F447; Læg fingeren på skærmen og flyt enhjørningen</div>div>
      <div id="start"><button>&#x1F984; Start eventyret<br><span style="font-size:.55em">Find Edith og Willa</span>span></button></div>div>
    </div>div>
  
  <script>
    const game=document.getElementById("game");
    const player=document.getElementById("player");
    const dragon=document.getElementById("dragon");
    const scoreEl=document.getElementById("score");
    const msg=document.getElementById("msg");
    const start=document.getElementById("start");
    const names=document.getElementById("names");

    const text="Edith Willa";
    const maxScore=10;
    let score=0,started=false,won=false,hitCooldown=false;

    // Fix 1: Brug game.clientWidth/Height i stedet for innerWidth/Height
    // sa positioner er relative til #game og ikke window
    function GW(){return game.clientWidth;}
    function GH(){return game.clientHeight;}

    let x=GW()*.18,y=GH()*.58,targetX=x,targetY=y;
    let dragonX=GW()*.85,dragonY=GH()*.45,dragonPhase=0;
    let audioCtx;
    const items=[];

    // Fix 1: resize-handler der opdaterer positioner og genstande
    window.addEventListener("resize",()=>{
        x=Math.max(42,Math.min(GW()-42,x));
        y=Math.max(GH()*.22,Math.min(GH()*.80,y));
        targetX=x;targetY=y;
        if(dragonX>GW()+90)dragonX=GW()+120;
        items.forEach(el=>{
              const lx=parseFloat(el.style.left);
              if(lx>GW()+200){
                      el.style.left=GW()+80+"px";
              }
              const ly=parseFloat(el.style.top);
              const newMax=GH()*.74;
              if(ly>newMax)el.style.top=newMax+"px";
        });
    });

    function buildNames(){
      names.innerHTML="";
      text.split("").forEach(ch=>{
        if(ch===" "){names.appendChild(document.createElement("br"));return;}
        const wrap=document.createElement("span");
        wrap.className="letter";
        wrap.textContent=ch;
        const fill=document.createElement("span");
        fill.className="fill";
        fill.textContent=ch;
        wrap.appendChild(fill);
        names.appendChild(wrap);
      });
    }
    function updateLetters(){
      document.querySelectorAll(".fill").forEach((el,i)=>{
        el.classList.toggle("show",i<score);
      });
      if(score>=maxScore&&!won){
        won=true;
        showMsg("Hurra for Edith og Willa! &#x1F386;",3500);
        fireworks();
      }
    }
    function showMsg(t,ms=1400){
      msg.textContent=t;
      msg.style.display="block";
      clearTimeout(showMsg.timer);
      showMsg.timer=setTimeout(()=>msg.style.display="none",ms);
    }
    function tone(freq,dur=.12,vol=.05,type="sine"){
      if(!audioCtx)return;
      const osc=audioCtx.createOscillator();
      const gain=audioCtx.createGain();
      osc.type=type;
      osc.frequency.value=freq;
      gain.gain.value=vol;
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      gain.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+dur);
      osc.stop(audioCtx.currentTime+dur);
    }
    function sparkle(){
      [784,988,1318].forEach((f,i)=>setTimeout(()=>tone(f,.08,.06),i*70));
    }
    function dragonSound(){
      tone(120,.18,.09,"sawtooth");
      setTimeout(()=>tone(170,.12,.05),120);
    }
    function fireSound(){
      tone(110,.16,.10,"sawtooth");
      setTimeout(()=>tone(900,.08,.07),90);
      setTimeout(()=>tone(1300,.08,.06),150);
    }
    function startMusic(){
      setInterval(()=>{
        if(!started)return;
        const notes=[392,523,587,659,784,659,523];
        tone(notes[Math.floor(Math.random()*notes.length)],.13,.018);
      },950);
    }
    function spawnItem(xPos){
      if(xPos===undefined)xPos=GW()+80;
      const el=document.createElement("div");
      el.className="item";
      const emojis=["&#x2B50;","&#x2B50;","&#x2B50;","&#x1F496;","&#x1F338;","&#x1F98B;"];
      el.textContent=emojis[Math.floor(Math.random()*emojis.length)];
      el.style.left=xPos+"px";
      el.style.top=GH()*(.26+Math.random()*.48)+"px";
      game.appendChild(el);
      items.push(el);
    }
    for(let i=0;i<6;i++)spawnItem(GW()*(.38+i*.22));

    function setTarget(clientX,clientY){
      if(!started)return;
      // Fix 4: konverter klient-koordinater til #game-relative koordinater
      const rect=game.getBoundingClientRect();
      const gx=clientX-rect.left;
      const gy=clientY-rect.top;
      targetX=Math.max(42,Math.min(GW()-42,gx));
      targetY=Math.max(GH()*.22,Math.min(GH()*.80,gy));
    }
    game.addEventListener("touchstart",e=>{
      e.preventDefault();
      setTarget(e.touches[0].clientX,e.touches[0].clientY);
    },{passive:false});
    game.addEventListener("touchmove",e=>{
      e.preventDefault();
      setTarget(e.touches[0].clientX,e.touches[0].clientY);
    },{passive:false});
    game.addEventListener("mousedown",e=>setTarget(e.clientX,e.clientY));
    game.addEventListener("mousemove",e=>{
      if(e.buttons)setTarget(e.clientX,e.clientY);
    });

    start.querySelector("button").onclick=async()=>{
      started=true;
      start.style.display="none";
      // Fix 3: try/catch pa AudioContext sa fejl pa iOS ikke crasher spillet
      try{
        audioCtx=new (window.AudioContext||window.webkitAudioContext)();
        if(audioCtx.state==="suspended")await audioCtx.resume();
      }catch(err){
        console.warn("AudioContext fejl:",err);
        audioCtx=null;
      }
      startMusic();
      sparkle();
      showMsg("Styr med fingeren &#x2728;",2100);
    };

    function collect(el){
      if(won)return;
      score=Math.min(maxScore,score+1);
      scoreEl.textContent=score;
      updateLetters();
      sparkle();
      // Flyt genstand til hojre side igen
      el.style.left=GW()+80+Math.random()*150+"px";
      el.style.top=GH()*(.26+Math.random()*.48)+"px";
      if(score===1)showMsg("Et bogstav kom frem! &#x2728;");
      if(score===5)showMsg("Edith er fremme! &#x1F496;");
    }
    function hitDragon(){
      if(hitCooldown||!started||won)return;
      hitCooldown=true;
      score=Math.max(0,score-1);
      scoreEl.textContent=score;
      updateLetters();
      dragonSound();
      showMsg("Ups! Dragen gemte et bogstav &#x1F409;",1500);
      player.style.filter="brightness(1.45)";
      setTimeout(()=>player.style.filter="",330);
      setTimeout(()=>hitCooldown=false,1700);
    }
    function fireworks(){
      for(let i=0;i<10;i++){
        setTimeout(()=>{
          fireSound();
          burst(Math.random()*GW(),GH()*(.10+Math.random()*.38));
        },i*420);
      }
    }
    function burst(cx,cy){
      const colors=["#ff5a7a","#ffb347","#fff45a","#77dd77","#6ec6ff","#b284ff","#ffffff"];
      for(let i=0;i<36;i++){
        const p=document.createElement("div");
        p.className="firework";
        p.style.left=cx+"px";
        p.style.top=cy+"px";
        p.style.background=colors[Math.floor(Math.random()*colors.length)];
        const a=Math.random()*Math.PI*2;
        const d=55+Math.random()*100;
        p.style.setProperty("--dx",Math.cos(a)*d+"px");
        p.style.setProperty("--dy",Math.sin(a)*d+"px");
        game.appendChild(p);
        setTimeout(()=>p.remove(),950);
      }
    }
    function loop(){
      if(started){
        x+=(targetX-x)*.09;
        y+=(targetY-y)*.09;

        dragonPhase+=.018;
        dragonX-=.78;
        // Fix 1: brug GH() i stedet for innerHeight i animationsloop
        dragonY=GH()*(.34+.24*(Math.sin(dragonPhase)*.5+.5));
      if(dragonX<-90)dragonX=GW()+120;

        items.forEach(el=>{
          // Fix 4: brug offsetLeft/offsetTop til kollision (relativt til #game)
          let lx=el.offsetLeft-1.45;
          el.style.left=lx+"px";
          if(lx<-70){
            el.style.left=GW()+80+Math.random()*150+"px";
            el.style.top=GH()*(.26+Math.random()*.48)+"px";
          }
          const ex=el.offsetLeft+el.offsetWidth/2;
          const ey=el.offsetTop+el.offsetHeight/2;
          if(Math.abs(ex-x)<54&&Math.abs(ey-y)<54){
            collect(el);
          }
        });

        // Fix 4: brug offsetLeft/offsetTop til dragon-kollision
        const dx=dragon.offsetLeft+dragon.offsetWidth/2;
        const dy=dragon.offsetTop+dragon.offsetHeight/2;
        if(Math.abs(dx-x)<58&&Math.abs(dy-y)<56){
          hitDragon();
        }
      }

      player.style.left=x+"px";
      player.style.top=y+"px";
      dragon.style.left=dragonX+"px";
      dragon.style.top=dragonY+"px";
      requestAnimationFrame(loop);
    }

    buildNames();
    updateLetters();
    loop();
  </script>
  </body>
</html>html>
  </script></button>
  </body>
  </style></title>
  </head>
