<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Edith & Willas Eventyr 2.0</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}html,body{margin:0;width:100%;height:100%;overflow:hidden;touch-action:none}body{font-family:"Comic Sans MS",Arial,sans-serif;background:#8edcff}
#game{position:relative;width:100vw;height:100dvh;overflow:hidden;background:linear-gradient(#84d9ff 0%,#d8f8ff 55%,#8ee08f 56%,#56bd60 100%)}#game.cat{background:linear-gradient(#8d8bff 0%,#cbbcff 48%,#b7f0d4 49%,#58bd7b 100%)}#game.cheetah{background:linear-gradient(#ffd27d 0%,#fff0b8 48%,#f2c96d 49%,#d49a3a 100%)}
.rainbow{position:absolute;left:-20vw;top:8vh;width:140vw;height:52vh;border-radius:50% 50% 0 0;opacity:.62;background:conic-gradient(from 270deg at 50% 100%,#ff5a7a 0 10deg,#ffb347 10deg 20deg,#fff45a 20deg 30deg,#77dd77 30deg 40deg,#6ec6ff 40deg 50deg,#b284ff 50deg 60deg,transparent 60deg 300deg,#ff5a7a 300deg 310deg,#ffb347 310deg 320deg,#fff45a 320deg 330deg,#77dd77 330deg 340deg,#6ec6ff 340deg 350deg,#b284ff 350deg 360deg)}
.sun{position:absolute;right:8vw;top:6vh;font-size:62px;animation:bob 3s infinite alternate}.cloud{position:absolute;font-size:46px;opacity:.85;animation:drift 25s linear infinite}.c1{top:17vh;left:-30vw}.c2{top:27vh;left:-60vw;animation-duration:34s}@keyframes drift{to{transform:translateX(150vw)}}@keyframes bob{from{transform:translateY(-5px)}to{transform:translateY(5px)}}
.ground{position:absolute;left:-10vw;right:-10vw;bottom:-7vh;height:26vh;border-radius:50% 50% 0 0;background:#54bd62}.cheetah .ground{background:#c58a36}.flowers{position:absolute;bottom:3vh;width:100%;font-size:28px;white-space:nowrap;opacity:.85}
#goal{position:absolute;left:50%;top:30%;transform:translate(-50%,-50%);width:96%;text-align:center;font-size:clamp(27px,7.4vw,58px);font-weight:bold;line-height:1.1;z-index:3}.letter{position:relative;display:inline-block;color:#ffffff30}.fill{position:absolute;inset:0;color:white;opacity:0;transform:scale(.6) translateY(18px);transition:.45s;text-shadow:0 4px 0 #ff91deaa,0 8px 18px #5a2a9a66}.fill.show{opacity:1;transform:scale(1) translateY(0)}
#player{position:absolute;font-size:clamp(62px,17vw,104px);z-index:20;transform:translate(-50%,-50%);filter:drop-shadow(0 8px 8px #0003)}.thing,.bad{position:absolute;font-size:clamp(38px,9vw,58px);z-index:15;transform:translate(-50%,-50%);animation:bob 1.5s infinite alternate}.bad.car{font-size:clamp(42px,10vw,64px);animation:none}.bad.bee{animation:bee 1s infinite alternate}@keyframes bee{from{transform:translate(-50%,-50%) rotate(-8deg)}to{transform:translate(-50%,-50%) rotate(8deg)}}
#hud{position:absolute;top:max(10px,env(safe-area-inset-top));left:10px;background:#ffffffcc;color:#6b3fa0;padding:9px 13px;border-radius:18px;font-weight:bold;font-size:18px;z-index:50;box-shadow:0 4px 10px #0002}#hud small{display:block;color:#8a3ffc}.msg{position:absolute;left:50%;top:13%;transform:translateX(-50%);background:#fff9;color:#8a3ffc;padding:12px 18px;border-radius:22px;font-size:clamp(21px,6vw,36px);font-weight:bold;text-align:center;z-index:80}
.overlay{position:absolute;inset:0;background:linear-gradient(#ffd6f5dd,#d8f7ffdd);display:flex;align-items:center;justify-content:center;text-align:center;z-index:100}.card{width:min(92vw,520px);background:#ffffffdd;border-radius:32px;padding:24px;box-shadow:0 12px 35px #0004;color:#7438ca}.btn{border:0;border-radius:28px;background:white;color:#9047ff;font-weight:bold;box-shadow:0 8px 24px #0003;touch-action:manipulation;pointer-events:auto;font-size:clamp(22px,7vw,38px);padding:16px 24px;margin:8px;min-width:220px}.small{font-size:20px;padding:12px 18px}.pink{background:#ffe6f6}.purple{background:#eee3ff}
.firework{position:absolute;width:8px;height:8px;border-radius:50%;z-index:90;pointer-events:none;animation:boom .9s ease-out forwards}@keyframes boom{from{transform:translate(0,0);opacity:1}to{transform:translate(var(--dx),var(--dy)) scale(.35);opacity:0}}#castle{position:absolute;left:50%;top:43%;transform:translate(-50%,-50%);font-size:clamp(100px,28vw,190px);z-index:12;filter:drop-shadow(0 10px 12px #0003)}.book{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:16px 0}.book div{background:#fff;border-radius:18px;padding:12px;font-size:38px;box-shadow:0 4px 12px #0002}.book small{display:block;font-size:13px;color:#7a40d8}.hidden{display:none!important}
</style>
</head>
<body>
<div id="game">
<audio id="music" src="music.mp3" preload="auto"></audio>
<div class="rainbow"></div><div class="sun" id="sun">☀️</div><div class="cloud c1">☁️ ☁️</div><div class="cloud c2">☁️</div><div id="goal"></div><div class="ground"></div><div class="flowers" id="flowers">🌸 🌼 🌷 🌸 🌻 🌼 🌸 🌷 🌼 🌸</div>
<div id="items"></div><div id="bads"></div><div id="player">🦄</div><div id="castle" class="hidden">🏰</div><div id="hud" class="hidden"><small id="who">Willa</small><span id="levelName">Bane 1</span><br>⭐ <span id="score">0</span>/<span id="max">0</span></div><div id="msg" class="msg hidden"></div>
<div id="menu" class="overlay"><div class="card"><h1>🌈 Edith & Willas Eventyr 2.0</h1><p>Vælg hvem der spiller</p><button class="btn pink" id="willa">🩷 Willa<br><small>4 år · let</small></button><button class="btn purple" id="edith">💜 Edith<br><small>8 år · sværere</small></button><button class="btn small" id="bookBtn">📖 Magisk dyrebog</button></div></div>
<div id="complete" class="overlay hidden"><div class="card"><h2 id="doneTitle">Flot!</h2><p id="doneText"></p><button class="btn" id="next">Næste bane</button><button class="btn small" id="menuBtn">Menu</button></div></div>
<div id="book" class="overlay hidden"><div class="card"><h2>📖 Magisk dyrebog</h2><div id="bookGrid" class="book"></div><button class="btn" id="back">Tilbage</button></div></div>
</div>
<script>
const levels=[
{id:"cat",cls:"cat",label:"Bane 1: Willas kat",text:"Mor og far elsker Edith og Willa",player:"🐱",items:["🥛","🐟","🧶","💖","⭐"],unlock:"🐱",win:"Kattebanen er klaret! 🎆",hit:"Av! Katten må ikke ramme bierne.",hazards:[["🐶","fly",.7,.35,.75],["🐝","bee",1.05,.22,.72],["🐝","bee",.9,.18,.60]]},
{id:"uni",cls:"",label:"Bane 2: Enhjørningen",text:"Willas kat finder mælk",player:"🦄",items:["⭐","⭐","💖","🌸","🦋"],unlock:"🦄",win:"Enhjørningen fandt magien! 🎆",hit:"Pas på! Enhjørningen ramte noget.",hazards:[["🐉","fly",.8,.25,.65],["🚗","car",1.35,.80,.80],["🚙","car",1.15,.86,.86]]},
{id:"cheetah",cls:"cheetah",label:"Bane 3: Ediths gepard",text:"Ediths gepard løber stærkt",player:"🐆",items:["⚡","⚡","💎","🌟","💖"],unlock:"🐆",win:"Ediths gepard vandt løbet! 🎆",hit:"Ups! Geparden ramte en forhindring.",hazards:[["🪨","ground",1.45,.78,.78],["🌵","ground",1.25,.76,.76],["🪨","ground",1.65,.84,.84]]}
];
const diffs={Willa:{name:"Willa",speed:.82,hazard:.75,loss:1,count:7},Edith:{name:"Edith",speed:1.22,hazard:1.25,loss:2,count:8}};
const cards=[["🦄","Enhjørning"],["🐱","Kat"],["🐆","Gepard"],["🐉","Drage"],["🐝","Bi"],["🦋","Sommerfugl"]];
const game=document.getElementById("game"),music=document.getElementById("music"),goal=document.getElementById("goal"),player=document.getElementById("player"),itemsEl=document.getElementById("items"),badsEl=document.getElementById("bads"),hud=document.getElementById("hud"),msgEl=document.getElementById("msg"),complete=document.getElementById("complete"),menu=document.getElementById("menu"),book=document.getElementById("book"),castle=document.getElementById("castle");
let diff,li=0,lvl,score=0,max=0,won=false,started=false,hitCd=false,x=innerWidth*.18,y=innerHeight*.58,tx=x,ty=y,items=[],bads=[],musicStarted=false,facing=1,lastX=x;
function W(){return game.clientWidth}function H(){return game.clientHeight}
function saveCard(e){let s=JSON.parse(localStorage.getItem("ew2")||'{"cards":[]}');if(!s.cards.includes(e))s.cards.push(e);localStorage.setItem("ew2",JSON.stringify(s))}
function show(t,ms=1600){msgEl.textContent=t;msgEl.classList.remove("hidden");clearTimeout(show.t);show.t=setTimeout(()=>msgEl.classList.add("hidden"),ms)}
function fade(a,b,d,done){clearInterval(fade.t);let n=0,N=40;fade.t=setInterval(()=>{n++;music.volume=a+(b-a)*n/N;if(n>=N){clearInterval(fade.t);music.volume=b;if(done)done()}},d/N)}
async function startMusic(){if(musicStarted)return;musicStarted=true;try{music.loop=false;music.volume=0;await music.play();fade(0,.35,2200);music.addEventListener("timeupdate",()=>{if(music.duration&&music.duration-music.currentTime<3&&!music.fading){music.fading=true;fade(music.volume,0,3000,()=>{music.pause();music.currentTime=0;setTimeout(async()=>{try{await music.play();music.fading=false;fade(0,.35,2200)}catch(e){music.fading=false}},10000)})}})}catch(e){}}
function buildLetters(){goal.innerHTML="";lvl.text.split("").forEach(ch=>{if(ch===" "){let sp=document.createElement("span");sp.style.display="inline-block";sp.style.width=".35em";goal.appendChild(sp);return}let w=document.createElement("span");w.className="letter";w.textContent=ch;let f=document.createElement("span");f.className="fill";f.textContent=ch;w.appendChild(f);goal.appendChild(w)})}
function updateLetters(){document.querySelectorAll(".fill").forEach((e,i)=>e.classList.toggle("show",i<score));if(score>=max&&!won)win()}
function rand(a){return a[Math.floor(Math.random()*a.length)]}
function load(){lvl=levels[li];game.className=lvl.cls;document.getElementById("sun").textContent=li==1?"🌙":"☀️";document.getElementById("flowers").textContent=li==1?"🌿 🧶 🌿 🐾 🌿 🧶 🌿 🐾 🌿":li==2?"🌾 🌵 🌾 🌼 🌾 🌵 🌾 🌼 🌾":"🌸 🌼 🌷 🌸 🌻 🌼 🌸 🌷 🌼 🌸";player.textContent=lvl.player;document.getElementById("levelName").textContent=lvl.label;document.getElementById("who").textContent=diff.name;max=lvl.text.replace(/ /g,"").length;document.getElementById("max").textContent=max;score=0;document.getElementById("score").textContent=0;won=false;hitCd=false;castle.classList.add("hidden");x=W()*.18;y=H()*.58;tx=x;ty=y;buildLetters();itemsEl.innerHTML="";badsEl.innerHTML="";items=[];bads=[];for(let i=0;i<diff.count;i++)spawnItem(W()*(.45+i*.2));lvl.hazards.forEach((h,i)=>spawnBad(h,W()+160+i*250));updateLetters()}
function spawnItem(px){let e=document.createElement("div");e.className="thing";e.textContent=rand(lvl.items);itemsEl.appendChild(e);items.push({e,x:px,y:H()*(.24+Math.random()*.52),s:(1.15+Math.random()*.5)*diff.speed})}
function spawnBad(h,px){let e=document.createElement("div");e.className="bad "+(h[1]=="car"?"car":h[1]=="bee"?"bee":"");e.textContent=h[0];badsEl.appendChild(e);bads.push({e,h,x:px,y:H()*(h[3]+Math.random()*(h[4]-h[3])),p:Math.random()*6.28,s:h[2]*diff.hazard})}
function choose(n){diff=diffs[n];li=0;menu.classList.add("hidden");hud.classList.remove("hidden");started=true;startMusic();load();show("Styr med fingeren ✨",2200)}
document.getElementById("willa").onclick=()=>choose("Willa");document.getElementById("edith").onclick=()=>choose("Edith");
function setTarget(cx,cy){if(!started||!complete.classList.contains("hidden"))return;let r=game.getBoundingClientRect(),newTx=Math.max(42,Math.min(W()-42,cx-r.left));if(Math.abs(newTx-x)>8)facing=newTx>x?1:-1;tx=newTx;ty=Math.max(H()*.18,Math.min(H()*.84,cy-r.top))}
function isUi(e){return e.target.closest(".overlay,.btn,button")}
game.addEventListener("touchstart",e=>{if(isUi(e))return;e.preventDefault();setTarget(e.touches[0].clientX,e.touches[0].clientY)},{passive:false});game.addEventListener("touchmove",e=>{if(isUi(e))return;e.preventDefault();setTarget(e.touches[0].clientX,e.touches[0].clientY)},{passive:false});game.addEventListener("mousedown",e=>{if(isUi(e))return;setTarget(e.clientX,e.clientY)});game.addEventListener("mousemove",e=>{if(isUi(e))return;if(e.buttons)setTarget(e.clientX,e.clientY)});
function collect(o){if(won)return;score=Math.min(max,score+1);document.getElementById("score").textContent=score;updateLetters();pop(o.x,o.y,o.e.textContent);o.x=W()+90+Math.random()*220;o.y=H()*(.24+Math.random()*.52);if(score==1)show("Et bogstav kom frem! ✨")}
function hit(){if(hitCd||won)return;hitCd=true;score=Math.max(0,score-diff.loss);document.getElementById("score").textContent=score;updateLetters();show(lvl.hit,1500);player.style.filter="brightness(1.5)";setTimeout(()=>player.style.filter="",330);setTimeout(()=>hitCd=false,1500)}
function pop(x,y,emoji){for(let i=0;i<8;i++){let p=document.createElement("div");p.style.cssText=`position:absolute;left:${x+Math.random()*50-25}px;top:${y+Math.random()*40-20}px;z-index:90;font-size:24px;animation:boom .8s ease-out forwards`;p.textContent=i%2?emoji:"✨";game.appendChild(p);setTimeout(()=>p.remove(),850)}}
function fireworks(){let colors=["#ff5a7a","#ffb347","#fff45a","#77dd77","#6ec6ff","#b284ff","#fff"];for(let b=0;b<12;b++)setTimeout(()=>{let cx=Math.random()*W(),cy=H()*(.12+Math.random()*.38);for(let i=0;i<38;i++){let p=document.createElement("div");p.className="firework";p.style.left=cx+"px";p.style.top=cy+"px";p.style.background=colors[i%colors.length];let a=Math.random()*Math.PI*2,d=55+Math.random()*110;p.style.setProperty("--dx",Math.cos(a)*d+"px");p.style.setProperty("--dy",Math.sin(a)*d+"px");game.appendChild(p);setTimeout(()=>p.remove(),950)}},b*330)}
function win(){won=true;saveCard(lvl.unlock);fireworks();document.getElementById("doneTitle").textContent=lvl.win;document.getElementById("doneText").textContent=li<levels.length-1?"Du har låst et dyr op i dyrebogen.":"Du har klaret alle baner!";document.getElementById("next").textContent=li<levels.length-1?"Næste bane":"Se regnbueslottet";setTimeout(()=>complete.classList.remove("hidden"),1100)}
document.getElementById("next").onclick=()=>{complete.classList.add("hidden");if(li<levels.length-1){li++;load();show("Ny bane! ✨",1800)}else{goal.innerHTML='<span class="letter">❤️ Mor&nbsp;&nbsp;❤️ Far<br>💜 Edith&nbsp;&nbsp;🩷 Willa</span>';castle.classList.remove("hidden");fireworks();show("Mor og far elsker Edith og Willa ❤️",4000);setTimeout(()=>{menu.classList.remove("hidden");hud.classList.add("hidden");started=false},5500)}};
document.getElementById("menuBtn").onclick=()=>{complete.classList.add("hidden");menu.classList.remove("hidden");hud.classList.add("hidden");started=false};
document.getElementById("bookBtn").onclick=()=>{let s=JSON.parse(localStorage.getItem("ew2")||'{"cards":[]}'),g=document.getElementById("bookGrid");g.innerHTML="";cards.forEach(c=>{let d=document.createElement("div");d.innerHTML=(s.cards.includes(c[0])?c[0]:"❔")+`<small>${s.cards.includes(c[0])?c[1]:"Ikke fundet"}</small>`;g.appendChild(d)});menu.classList.add("hidden");book.classList.remove("hidden")};
document.getElementById("back").onclick=()=>{book.classList.add("hidden");menu.classList.remove("hidden")};
function loop(){if(started&&!won){x+=(tx-x)*.10;y+=(ty-y)*.10;items.forEach(o=>{o.x-=o.s;if(o.x<-60){o.x=W()+90+Math.random()*240;o.y=H()*(.24+Math.random()*.52);o.e.textContent=rand(lvl.items)}o.e.style.left=o.x+"px";o.e.style.top=o.y+"px";if(Math.abs(o.x-x)<55&&Math.abs(o.y-y)<55)collect(o)});bads.forEach(o=>{o.p+=.035;o.x-=o.s;if(o.h[1]=="bee"||o.h[1]=="fly")o.y+=Math.sin(o.p)*1.1;if(o.x<-90){o.x=W()+120+Math.random()*260;o.y=H()*(o.h[3]+Math.random()*(o.h[4]-o.h[3]))}o.e.style.left=o.x+"px";o.e.style.top=o.y+"px";if(Math.abs(o.x-x)<58&&Math.abs(o.y-y)<58)hit()})}if(Math.abs(x-lastX)>.4)facing=x>lastX?1:-1;lastX=x;player.style.left=x+"px";player.style.top=y+"px";player.style.transform="translate(-50%,-50%) scaleX("+facing+")";requestAnimationFrame(loop)}loop();
</script>
</body>
</html>
