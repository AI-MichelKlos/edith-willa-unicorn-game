<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Operation Grå Vinge</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@400;500&family=Space+Mono&display=swap" rel="stylesheet">
<style>
  :root{
    --green:#6b9e78; --red:#d13b2e; --gold:#c9a24b;
    --ink:#0e1419; --line:#283038;
    --paper:#efe9dc; --paper-ink:#2c2823; --muted-paper:#8a8072;
  }
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:radial-gradient(circle at 50% -10%, #16232c, #0a0f14 70%);color:#e7ecea;font-family:'Inter',system-ui,sans-serif;display:flex;justify-content:center;padding:18px 14px 30px}
  .stage{width:100%;max-width:640px}
  .head{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:2.5px;font-size:12px;color:var(--muted-paper);text-align:center;margin:2px 0 14px}
  .card{background:var(--paper);color:var(--paper-ink);border-radius:10px;padding:22px 22px 24px;position:relative;box-shadow:0 20px 46px rgba(0,0,0,.45);overflow:hidden}
  .card::after{content:"FORTROLIGT";position:absolute;right:-30px;bottom:6px;font-family:'Oswald',sans-serif;font-size:74px;font-weight:700;color:rgba(44,40,35,.05);letter-spacing:4px;pointer-events:none}
  .card>*{position:relative;z-index:1}
  .stamp{position:absolute;top:16px;right:16px;z-index:3;font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:2px;font-size:12px;border:2px solid var(--red);color:var(--red);padding:4px 10px;border-radius:4px;transform:rotate(6deg)}
  .meta{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted-paper)}
  .country{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:1px;color:var(--green);margin-top:6px}
  h1.title{font-family:'Oswald',sans-serif;font-size:30px;margin:5px 0 12px;line-height:1.05;color:#211d18}
  .situation{font-size:15.5px;line-height:1.55;color:#2c2823;margin:0}
  .situation+.situation{margin-top:10px}
  .verdict{display:flex;align-items:center;gap:9px;font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:1px;font-size:19px;margin:4px 0 10px}
  .verdict .dot{width:11px;height:11px;border-radius:50%;flex:none}
  .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
  .btn{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:1.2px;font-size:14px;padding:12px 18px;border-radius:6px;border:1px solid var(--line);background:#1c252d;color:#e7ecea;cursor:pointer;transition:transform .05s}
  .btn:active{transform:translateY(1px)}
  .btn.go{background:var(--green);border-color:var(--green);color:#0e1419;font-weight:600}
  .btn.big{font-size:15px;padding:13px 22px}
  .wrap{position:relative;border-radius:10px;overflow:hidden;border:1px solid var(--line);background:#0b1118;box-shadow:0 20px 46px rgba(0,0,0,.45)}
  .hud{display:flex;justify-content:space-between;align-items:center;gap:8px;font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.3px;color:#cdd6d6;padding:10px 12px;background:#11181f;border-bottom:1px solid var(--line)}
  .hud b{color:var(--gold)}
  canvas{display:block;width:100%;height:auto;cursor:crosshair;touch-action:manipulation;background:#9fc0d8}
  .hint{position:absolute;left:0;right:0;bottom:10px;text-align:center;font-family:'Space Mono',monospace;font-size:11px;color:#25323a;pointer-events:none;text-shadow:0 1px 2px rgba(255,255,255,.55)}
  .foot{text-align:center;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.4px;color:var(--muted-paper);margin-top:16px;line-height:1.6}
</style>
</head>
<body>
  <div class="stage">
    <div class="head" id="head">Operation Grå Vinge</div>
    <div id="app"></div>
    <div class="foot">Satire. Enhver fugl i denne operation er fiktiv og fløj frivilligt.<br>Grafik og databehandling: en meget tvivlsom kilde.</div>
  </div>
<script>
(function(){
  const app = document.getElementById('app');
  const head = document.getElementById('head');
  let RAF = null;
  function cancel(){ if(RAF){ cancelAnimationFrame(RAF); RAF=null; } }

  function briefing(){
    cancel();
    head.textContent = 'Operation Grå Vinge · briefing';
    app.innerHTML = `
      <div class="card">
        <div class="stamp">Fortroligt</div>
        <div class="meta">Freelance · Martin R.</div>
        <div class="country">Danmark</div>
        <h1 class="title">Operation Grå Vinge</h1>
        <p class="situation">Den fiktive spindoktor Martin R. har hyret dig til en yderst tvivlsom opgave. Konklusionen ligger allerede fast: der var russiske droner over Danmark. Nu skal beviset bare produceres.</p>
        <p class="situation">Planen i tre trin: fang måger, duer og krager. Mal dem diskret grå, og skriv mystiske kyrilliske bogstaver på vingerne. Slip dem løs over landet, og skyd dem ned igen. Så har vi uigendrivelige beviser til statsministeren.</p>
        <p class="situation" style="color:#6f6757">(Enhver lighed med virkelige efterretningsvurderinger er helt og aldeles utilsigtet.)</p>
        <div class="actions">
          <button class="btn go big" id="start">Start operationen ▸</button>
        </div>
      </div>`;
    document.getElementById('start').onclick = game;
  }

  function game(){
    cancel();
    head.textContent = 'Operation Grå Vinge';
    const W=640, H=360;
    app.innerHTML = `
      <div class="wrap">
        <div class="hud"><span id="phase">Trin 1: fang fuglene</span><span id="stat"></span></div>
        <canvas id="cv" width="${W}" height="${H}"></canvas>
        <div class="hint" id="hint">Tryk på måger, duer og krager</div>
      </div>`;
    const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
    const phaseEl=document.getElementById('phase'), statEl=document.getElementById('stat'), hintEl=document.getElementById('hint');

    const KYR=['\u042f','\u0416','\u0424','\u0414','\u0411','\u0413','\u0417','\u041b','\u041f','\u0426','\u0427','\u0428','\u042e'];
    const clouds=[]; for(let i=0;i<5;i++) clouds.push({x:Math.random()*W,y:18+Math.random()*90,s:0.7+Math.random()*0.8});
    const TYPER=[{k:'maage',col:'#eef2f4',r:17},{k:'due',col:'#8f9aa3',r:15},{k:'krage',col:'#22262b',r:16}];

    let phase='fang', last=performance.now(), tLeft=14, spawnT=0, pointer={x:W/2,y:H/2}, lastFire=0, evidens=0, ended=false, malDone=0;
    const birds=[], caught=[], flying=[], shots=[], booms=[];

    function pt(e){ const r=cv.getBoundingClientRect(); return {x:(e.clientX-r.left)*(W/r.width), y:(e.clientY-r.top)*(H/r.height)}; }
    function spawnBird(){
      const ty=TYPER[Math.floor(Math.random()*TYPER.length)];
      const l=Math.random()<0.5, sp=(1.1+Math.random()*1.2)*(l?1:-1);
      birds.push({k:ty.k,col:ty.col,r:ty.r,x:l?-30:W+30,y:40+Math.random()*180,vx:sp,bob:Math.random()*6.28});
    }
    function drawCloud(x,y,s,dusk){ ctx.fillStyle= dusk ? 'rgba(200,212,222,.10)' : 'rgba(255,255,255,.72)'; ctx.beginPath(); ctx.ellipse(x,y,26*s,14*s,0,0,6.28); ctx.ellipse(x+20*s,y+4*s,20*s,11*s,0,0,6.28); ctx.ellipse(x-20*s,y+4*s,18*s,10*s,0,0,6.28); ctx.fill(); }
    function drawCross(){ ctx.strokeStyle='rgba(244,198,78,.9)'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.arc(pointer.x,pointer.y,10,0,6.28); ctx.moveTo(pointer.x-15,pointer.y); ctx.lineTo(pointer.x+15,pointer.y); ctx.moveTo(pointer.x,pointer.y-15); ctx.lineTo(pointer.x,pointer.y+15); ctx.stroke(); }
    function drawBird(b,painted){
      const col = painted ? '#8a9095' : b.col;
      const d = (b.vx<0) ? -1 : 1;
      const wob=Math.sin(b.bob)*b.r*0.35;
      ctx.strokeStyle=col; ctx.lineWidth=b.r*0.5; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(b.x - d*b.r*0.2, b.y); ctx.lineTo(b.x - d*b.r*0.9, b.y - b.r*0.4 - wob); ctx.stroke();
      ctx.fillStyle=col; ctx.beginPath(); ctx.ellipse(b.x,b.y,b.r,b.r*0.62,0,0,6.28); ctx.fill();
      ctx.beginPath(); ctx.arc(b.x + d*b.r*0.85, b.y - b.r*0.3, b.r*0.4, 0,6.28); ctx.fill();
      ctx.fillStyle='#e0a43e'; ctx.beginPath(); ctx.moveTo(b.x + d*b.r*1.2, b.y - b.r*0.3); ctx.lineTo(b.x + d*b.r*1.62, b.y - b.r*0.18); ctx.lineTo(b.x + d*b.r*1.2, b.y - b.r*0.05); ctx.closePath(); ctx.fill();
      ctx.strokeStyle=col; ctx.beginPath(); ctx.moveTo(b.x - d*b.r*0.1, b.y); ctx.lineTo(b.x - d*b.r*0.6, b.y + b.r*0.5 + wob*0.5); ctx.stroke();
      if(painted && b.letter){ ctx.fillStyle='#c0392b'; ctx.font='bold '+Math.round(b.r*0.95)+"px 'Space Mono', monospace"; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(b.letter, b.x, b.y - b.r*0.05); }
    }

    function setPhase(p){
      phase=p; last=performance.now(); malDone=0;
      if(p==='fang'){ tLeft=14; phaseEl.textContent='Trin 1: fang fuglene'; hintEl.textContent='Tryk på måger, duer og krager'; }
      else if(p==='mal'){ phaseEl.textContent='Trin 2: mal grå og skriv kyrillisk'; hintEl.textContent='Tryk på hver fugl'; caught.forEach((b,i)=>{ b.dx=70+(i%6)*90; b.dy=150+Math.floor(i/6)*84; b.painted=false; b.letter=null; }); }
      else if(p==='skyd'){ tLeft=14; phaseEl.textContent='Trin 3: slip løs og skyd'; hintEl.textContent='Skyd de grå fugle ned som bevis'; caught.forEach(b=>{ const l=Math.random()<0.5; b.x=l?-30:W+30; b.y=40+Math.random()*170; b.vx=(1.3+Math.random()*1.1)*(l?1:-1); b.down=false; b.vy=0; flying.push(b); }); }
    }
    function updateFang(dt){
      tLeft-=dt/1000; if(tLeft<0)tLeft=0;
      statEl.textContent='\u23f1 '+Math.ceil(tLeft)+' s · fanget '+caught.length;
      spawnT-=dt; if(spawnT<=0){ spawnBird(); spawnT=470+Math.random()*360; }
      for(let i=birds.length-1;i>=0;i--){ const b=birds[i]; b.x+=b.vx*(dt/16); b.bob+=0.12; b.y+=Math.sin(b.bob)*0.4; if(b.x<-70||b.x>W+70) birds.splice(i,1); else drawBird(b,false); }
      if(tLeft<=0){ if(caught.length===0){ ended=true; report(0); } else setPhase('mal'); }
    }
    function updateMal(dt){
      const painted = caught.filter(b=>b.painted).length;
      statEl.textContent='malet '+painted+' / '+caught.length;
      caught.forEach(b=>{ b.x=b.dx; b.y=b.dy; if(!b.painted){ ctx.strokeStyle='rgba(193,57,43,.5)'; ctx.lineWidth=1.5; ctx.setLineDash([4,4]); ctx.beginPath(); ctx.arc(b.dx,b.dy,b.r+9,0,6.28); ctx.stroke(); ctx.setLineDash([]); } drawBird(b,b.painted); });
      if(painted===caught.length){ malDone+=dt; if(malDone>600) setPhase('skyd'); } else malDone=0;
    }
    function updateSkyd(dt){
      tLeft-=dt/1000; if(tLeft<0)tLeft=0;
      statEl.textContent='\u23f1 '+Math.ceil(tLeft)+' s · beviser '+evidens;
      let up=0;
      flying.forEach(b=>{ if(b.down){ b.vy+=0.3; b.y+=b.vy; b.bob+=0.5; } else { b.x+=b.vx*(dt/16); b.bob+=0.12; b.y+=Math.sin(b.bob)*0.4; if(b.x<-40)b.x=W+40; if(b.x>W+40)b.x=-40; up++; } });
      flying.forEach(b=>{ if(b.y<H+50) drawBird(b,true); });
      ctx.fillStyle='#2f3a2c'; ctx.fillRect(W/2-14,H-56,28,12); ctx.fillStyle='#4a5a3f'; ctx.fillRect(W/2-3,H-66,6,12);
      drawCross();
      if(tLeft<=0 || up===0){ ended=true; report(evidens); }
    }
    function frame(now){
      const dt=Math.min(50, now-last); last=now;
      const dusk = phase==='skyd';
      const g=ctx.createLinearGradient(0,0,0,H);
      if(dusk){ g.addColorStop(0,'#14202b'); g.addColorStop(1,'#38473c'); } else { g.addColorStop(0,'#9fc0d8'); g.addColorStop(1,'#d2e2e9'); }
      ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
      clouds.forEach(c=>{ if(!dusk){ c.x+=0.15; if(c.x>W+70)c.x=-70; } drawCloud(c.x,c.y,c.s,dusk); });
      ctx.fillStyle = dusk ? '#243026' : '#6f9e5a'; ctx.fillRect(0,H-46,W,46);
      ctx.fillStyle = dusk ? '#1b2419' : '#5f8a4d'; ctx.fillRect(0,H-46,W,5);

      if(phase==='fang') updateFang(dt);
      else if(phase==='mal') updateMal(dt);
      else if(phase==='skyd') updateSkyd(dt);

      for(let i=shots.length-1;i>=0;i--){ const s=shots[i]; ctx.globalAlpha=Math.max(0,s.life); ctx.strokeStyle='#f4c64e'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(s.x1,s.y1); ctx.lineTo(s.x2,s.y2); ctx.stroke(); s.life-=dt/170; if(s.life<=0)shots.splice(i,1);} ctx.globalAlpha=1;
      for(let i=booms.length-1;i>=0;i--){ const b=booms[i]; const rr=(1-b.life)*18+5; ctx.globalAlpha=Math.max(0,b.life)*0.85; ctx.fillStyle=b.c; ctx.beginPath(); ctx.arc(b.x,b.y,rr,0,6.28); ctx.fill(); b.life-=dt/340; if(b.life<=0)booms.splice(i,1);} ctx.globalAlpha=1;

      if(ended) return;
      RAF=requestAnimationFrame(frame);
    }

    cv.addEventListener('pointerdown', e=>{ const p=pt(e); pointer=p;
      if(phase==='fang'){
        for(let i=0;i<birds.length;i++){ const b=birds[i]; if(Math.hypot(b.x-p.x,b.y-p.y)<b.r+14){ caught.push({k:b.k,col:b.col,r:b.r,bob:0}); booms.push({x:b.x,y:b.y,life:1,c:'#ffffff'}); birds.splice(i,1); if(caught.length>=12) tLeft=0; break; } }
      } else if(phase==='mal'){
        for(let i=0;i<caught.length;i++){ const b=caught[i]; if(!b.painted && Math.hypot(b.dx-p.x,b.dy-p.y)<b.r+16){ b.painted=true; b.letter=KYR[Math.floor(Math.random()*KYR.length)]; booms.push({x:b.dx,y:b.dy,life:1,c:'#9aa0a4'}); break; } }
      } else if(phase==='skyd'){
        const now=performance.now(); if(now-lastFire<130) return; lastFire=now;
        shots.push({x1:W/2,y1:H-58,x2:p.x,y2:p.y,life:1});
        let hi=-1,hd=1e9; flying.forEach((b,i)=>{ if(!b.down){ const d=Math.hypot(b.x-p.x,b.y-p.y); if(d<b.r+14&&d<hd){hd=d;hi=i;} } });
        if(hi>=0){ const b=flying[hi]; b.down=true; b.vy=1.5; evidens++; booms.push({x:b.x,y:b.y,life:1,c:'#c0392b'}); }
      }
    });
    cv.addEventListener('pointermove', e=>{ pointer=pt(e); });

    setPhase('fang');
    RAF=requestAnimationFrame(frame);
  }

  function report(count){
    cancel();
    head.textContent = 'Operation Grå Vinge · rapport';
    let body, stamp, farve;
    if(count>0){
      farve='var(--red)'; stamp='Uigendriveligt';
      body='Du leverede '+count+' grå fugle med kyrilliske vingemarkeringer, behørigt nedskudt over dansk jord. Martin R. sender billederne videre til statsministeren med teksten: se selv. Konklusionen stod skrevet på forhånd, nu har den fjer. Ingen spurgte, om en måge kan flyve fra Moskva.';
    } else {
      farve='#8f8675'; stamp='Uden bevis';
      body='Du fangede ingen fugle. Uden gråmalede måger står Martin R. tilbage med en teori og ingen billeder, og sagen forbliver, pinligt nok, kun en påstand.';
    }
    app.innerHTML = `
      <div class="card">
        <div class="stamp" style="color:${farve};border-color:${farve}">${stamp}</div>
        <div class="meta">Operation Grå Vinge · rapport</div>
        <div class="country">Danmark</div>
        <h1 class="title">Beviserne er klar</h1>
        <div class="verdict" style="color:${farve}"><span class="dot" style="background:${farve}"></span>${count>0 ? count+' uigendrivelige beviser' : 'Ingen beviser'}</div>
        <p class="situation">${body}</p>
        <div class="actions">
          <button class="btn go big" id="again">Kør igen ▸</button>
          <button class="btn big" id="back">Til briefing ▸</button>
        </div>
      </div>`;
    document.getElementById('again').onclick = game;
    document.getElementById('back').onclick = briefing;
  }

  briefing();
})();
</script>
</body>
</html>
